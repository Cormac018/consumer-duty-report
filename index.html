<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consumer Duty Annual Report — Review</title>
<style>
  :root{
    --ink:#331047; --ink-2:#4a1d63; --green:#23F3A1; --green-ink:#0b7a54;
    --bg:#e9e6ef; --panel:#ffffff; --hair:#E5E5E5; --muted:#5C5C5C;
    --rail-w:360px; --bar-h:58px;
    --font:'Proxima Nova','Helvetica Neue',Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

  .bar{height:var(--bar-h);flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:0 16px;background:var(--ink);color:#fff;box-shadow:0 1px 0 rgba(0,0,0,.15);z-index:40}
  .brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
  .brand .k{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--green)}
  .brand .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw}
  .seg{display:none;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:3px;gap:3px}
  .seg.show{display:inline-flex}
  .seg button{appearance:none;border:0;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.78);background:transparent;font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:7px;white-space:nowrap}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--ink)}
  .seg button:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .spacer{flex:1 1 auto}

  .zoom{display:inline-flex;align-items:center;gap:2px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:2px}
  .zoom button{appearance:none;border:0;background:transparent;color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;width:28px;height:28px;border-radius:6px}
  .zoom button:hover{background:rgba(255,255,255,.15)}
  .zoom .pg{font-size:11px;color:rgba(255,255,255,.82);font-weight:700;padding:0 8px;white-space:nowrap;min-width:74px;text-align:center}

  .btn{appearance:none;font-family:inherit;cursor:pointer;border-radius:9px;font-size:12.5px;font-weight:700;padding:8px 13px;display:inline-flex;align-items:center;gap:8px}
  .btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .btn-ghost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.20)}
  .btn-ghost:hover{background:rgba(255,255,255,.18)}
  .btn-comment{background:var(--green);color:#062b1e;border:1px solid var(--green)}
  .btn-comment[aria-pressed="true"]{box-shadow:0 0 0 3px rgba(35,243,161,.35)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
  .count-badge{background:rgba(255,255,255,.22);border-radius:20px;font-size:11px;font-weight:800;padding:1px 8px;min-width:20px;text-align:center}
  .mode-pill{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.85)}
  .mode-shared .dot{background:var(--green)} .mode-local .dot{background:#ffcf5c}

  .main{flex:1 1 auto;display:flex;min-height:0;position:relative}
  .stage{flex:1 1 auto;position:relative;min-width:0}
  .pdf-scroll{position:absolute;inset:0;overflow:auto;padding:22px 16px 60px;scroll-behavior:smooth}
  .pdf-scroll[hidden]{display:none}
  .pdf-inner{display:flex;flex-direction:column;align-items:center;gap:18px}
  .pdf-page{position:relative;background:#fff;box-shadow:0 4px 18px rgba(51,16,71,.14);border-radius:2px;overflow:hidden}
  .pdf-page canvas{display:block;width:100%;height:100%}
  .pdf-page .ph{position:absolute;inset:0;display:grid;place-items:center;color:#b9adcb;font-size:12px;font-weight:700;letter-spacing:.1em}
  .pdf-pagenum{position:absolute;top:8px;left:8px;background:rgba(51,16,71,.72);color:#fff;font-size:10px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:20px;z-index:5;pointer-events:none}

  body.arming .pdf-scroll{cursor:crosshair}
  .arm-hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:22px;box-shadow:0 6px 22px rgba(51,16,71,.35);z-index:30;display:none;align-items:center;gap:9px;pointer-events:none}
  .arm-hint .k{color:var(--green);font-weight:800}
  body.arming .arm-hint{display:inline-flex}

  .cd-pin{position:absolute;transform:translate(-50%,-100%);width:26px;height:34px;cursor:pointer;z-index:8;filter:drop-shadow(0 3px 5px rgba(51,16,71,.35))}
  .cd-pin svg{width:26px;height:34px;display:block}
  .cd-pin .num{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#062b1e;line-height:18px}
  .cd-pin.sel .num{color:#fff}
  .cd-pin.resolved{opacity:.45;filter:none}
  .cd-pin.pending{animation:cdpulse 1.1s ease-in-out infinite}
  @keyframes cdpulse{0%,100%{transform:translate(-50%,-100%) scale(1)}50%{transform:translate(-50%,-100%) scale(1.14)}}

  .rail-toggle-float{position:absolute;top:12px;right:12px;z-index:25;display:none}
  body.rail-collapsed .rail-toggle-float{display:inline-flex}

  .rail{flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--panel);border-left:1px solid var(--hair);display:flex;flex-direction:column;min-height:0;transition:margin-right .22s ease;z-index:20}
  body.rail-collapsed .rail{margin-right:calc(-1 * var(--rail-w))}
  .rail-head{padding:14px 16px 10px;border-bottom:1px solid var(--hair);flex:0 0 auto}
  .rail-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .rail-title h2{margin:0;font-size:14px;font-weight:800}
  .rail-title .n{font-size:12px;color:var(--muted);font-weight:700}
  .who{display:flex;align-items:center;gap:8px;margin-top:11px}
  .who label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .who input{flex:1;font-family:inherit;font-size:13px;border:1px solid var(--hair);border-radius:8px;padding:6px 9px;color:var(--ink)}
  .who input:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}
  .filters{display:flex;gap:6px;margin-top:11px}
  .filters button{flex:1;appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--hair);background:#fafafa;color:var(--muted);border-radius:7px;padding:6px 4px}
  .filters button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .rail-list{flex:1 1 auto;overflow-y:auto;padding:12px 14px 40px}
  .empty{color:var(--muted);font-size:13px;line-height:1.6;text-align:center;padding:34px 18px}
  .empty svg{opacity:.5;margin-bottom:10px}

  .card{border:1px solid var(--hair);border-radius:12px;padding:12px 13px;margin-bottom:11px;background:#fff;transition:box-shadow .15s,border-color .15s;cursor:pointer}
  .card:hover{border-color:#cdbfe0}
  .card.active{border-color:var(--ink);box-shadow:0 0 0 3px rgba(51,16,71,.12)}
  .card.resolved{opacity:.62}
  .card.resolved .c-body{text-decoration:line-through;text-decoration-color:rgba(51,16,71,.35)}
  .c-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .avatar{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:10.5px;font-weight:800;color:#fff;background:var(--ink)}
  .c-meta{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .c-meta .nm{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c-meta .tm{font-size:10.5px;color:var(--muted)}
  .vbadge{margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:#f0ecf5;color:var(--ink)}
  .c-body{font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .pin-ref{font-size:10.5px;color:var(--green-ink);font-weight:700;margin-top:6px;display:inline-flex;align-items:center;gap:5px}
  .replies{margin-top:9px;border-top:1px solid var(--hair);padding-top:9px;display:flex;flex-direction:column;gap:9px}
  .reply{display:flex;gap:8px}
  .reply .avatar{width:20px;height:20px;font-size:9px;background:var(--ink-2)}
  .reply .r-body{font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .reply .r-nm{font-size:11px;font-weight:800}.reply .r-tm{font-size:10px;color:var(--muted);margin-left:6px;font-weight:600}
  .c-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .c-actions button{appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--hair);background:#fff;color:var(--muted);border-radius:7px;padding:5px 9px}
  .c-actions button:hover{border-color:#cdbfe0;color:var(--ink)}
  .c-actions button.danger:hover{border-color:#e6b0aa;color:#c0392b}
  .reply-box{display:none;margin-top:9px;gap:6px;flex-direction:column}
  .reply-box.open{display:flex}
  textarea.ta{font-family:inherit;font-size:12.5px;line-height:1.5;border:1px solid var(--hair);border-radius:9px;padding:8px 10px;resize:vertical;min-height:54px;color:var(--ink);width:100%}
  textarea.ta:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}
  .composer{border:1px solid var(--ink);border-radius:12px;padding:12px 13px;margin-bottom:12px;background:#fbf9ff;box-shadow:0 6px 20px rgba(51,16,71,.10)}
  .composer h3{margin:0 0 4px;font-size:12.5px;font-weight:800}
  .composer .hint{font-size:11px;color:var(--muted);margin:0 0 9px}
  .composer .row{display:flex;gap:7px;margin-top:9px;justify-content:flex-end}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{position:absolute;inset:0;display:grid;place-items:center;z-index:15;color:var(--muted);font-size:13px;font-weight:600;background:var(--bg)}
  .loading .sp{width:26px;height:26px;border:3px solid #cdbfe0;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:820px){:root{--rail-w:88vw}.brand .t{display:none}.zoom .pg{min-width:56px}.rail{position:absolute;inset:var(--bar-h) 0 0 auto;box-shadow:-8px 0 30px rgba(0,0,0,.14)}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;scroll-behavior:auto !important}.cd-pin.pending{animation:none}.loading .sp{animation:none}}
</style>

<script type="module">
/* =======================================================================
   Consumer Duty Board Review — PDF viewer + pin comments
   - Renders each PDF page with PDF.js into canvases we control
   - Pin comments overlaid on the pages (the PDF itself is never modified)
   - Comments stored locally or shared live via Supabase / Firebase
   ======================================================================= */

const DOCS  = window.DOCS;
const SBCFG = window.SUPABASE_CONFIG || {};
const FBCFG = window.FIREBASE_CONFIG || {};
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36).slice(2));
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const body=document.body, stage=document.getElementById('stage'), segEl=document.getElementById('seg');
const commentBtn=document.getElementById('commentToggle'), railToggle=document.getElementById('railToggle'), railToggleF=document.getElementById('railToggleFloat');
const railList=document.getElementById('railList'), railCount=document.getElementById('railCount');
const countBadge=document.getElementById('countBadge'), countBadgeF=document.getElementById('countBadgeFloat');
const authorInput=document.getElementById('authorInput'), filterBtns=[...document.querySelectorAll('.filters button')];
const toastEl=document.getElementById('toast'), modePill=document.getElementById('modePill'), modeText=document.getElementById('modeText');
const brandTitle=document.getElementById('brandTitle'), pageInd=document.getElementById('pageInd'), loadingEl=document.getElementById('loading');

let comments=[], activeDoc=DOCS[0].id, armed=false, filter='current', selectedId=null, pending=null;
let zoom=1; const docState={}; const store={adapter:null};
const AUTHOR_KEY='cd_report_author';
authorInput.value=localStorage.getItem(AUTHOR_KEY)||'';
authorInput.addEventListener('input',()=>localStorage.setItem(AUTHOR_KEY,authorInput.value.trim()));
const authorName=()=>authorInput.value.trim()||'Anonymous';

let toastT; function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),2600);}
function ago(ts){const s=Math.max(1,Math.floor((Date.now()-ts)/1000));if(s<60)return'just now';const m=(s/60)|0;if(m<60)return m+'m ago';const h=(m/60)|0;if(h<24)return h+'h ago';const d=(h/24)|0;if(d<7)return d+'d ago';return new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short'});}
function initials(n){const p=n.trim().split(/\s+/);if(!p[0])return'?';return((p[0][0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase();}
function labelOf(id){const d=DOCS.find(x=>x.id===id);return d?d.label:id;}

/* ============================ STORAGE ============================ */
function makeLocalAdapter(){
  const KEY='cd_report_comments_v1', subs=[];
  const read=()=>{try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}};
  const write=a=>{localStorage.setItem(KEY,JSON.stringify(a));emit()};
  const emit=()=>{const a=read();subs.forEach(cb=>cb(a))};
  window.addEventListener('storage',e=>{if(e.key===KEY)emit()});
  return{kind:'local',
    subscribe(cb){subs.push(cb);cb(read())},
    async add(c){const a=read();a.push(c);write(a)},
    async update(id,p){const a=read();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...p};write(a)}},
    async addReply(id,r){const a=read();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i].replies=[...(a[i].replies||[]),r];write(a)}},
    async remove(id){write(read().filter(x=>x.id!==id))}};
}
async function makeSupabaseAdapter(cfg){
  const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2');
  const sb=createClient(cfg.url,cfg.anonKey), TABLE='cd_report_comments'; let cb=null;
  const row2c=r=>({id:r.id,version:r.version,anchor:r.anchor,author:r.author,text:r.body,createdAt:Number(r.created_at),resolved:!!r.resolved,replies:r.replies||[]});
  async function fetchAll(){const{data,error}=await sb.from(TABLE).select('*');if(error){console.error('[supabase]',error);return[]}return(data||[]).map(row2c);}
  const push=()=>{if(cb)fetchAll().then(cb)};
  return{kind:'shared',
    subscribe(fn){cb=fn;push();sb.channel('cd_rt').on('postgres_changes',{event:'*',schema:'public',table:TABLE},push).subscribe()},
    async add(c){const{error}=await sb.from(TABLE).insert({id:c.id,version:c.version,anchor:c.anchor,author:c.author,body:c.text,created_at:c.createdAt,resolved:c.resolved,replies:c.replies||[]});if(error)console.error(error);push()},
    async update(id,p){const row={};if('resolved'in p)row.resolved=p.resolved;if('text'in p)row.body=p.text;if('replies'in p)row.replies=p.replies;const{error}=await sb.from(TABLE).update(row).eq('id',id);if(error)console.error(error);push()},
    async addReply(id,r){const{data}=await sb.from(TABLE).select('replies').eq('id',id).single();const replies=[...((data&&data.replies)||[]),r];await sb.from(TABLE).update({replies}).eq('id',id);push()},
    async remove(id){await sb.from(TABLE).delete().eq('id',id);push()}};
}
async function makeFirebaseAdapter(cfg){
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
  const {getFirestore,collection,onSnapshot,doc,setDoc,updateDoc,deleteDoc,arrayUnion}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
  const app=initializeApp(cfg),db=getFirestore(app),col=collection(db,'cd_report_comments');
  return{kind:'shared',
    subscribe(cb){onSnapshot(col,s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))))},
    async add(c){const{id,...rest}=c;await setDoc(doc(col,id),rest)},
    async update(id,p){await updateDoc(doc(col,id),p)},
    async addReply(id,r){await updateDoc(doc(col,id),{replies:arrayUnion(r)})},
    async remove(id){await deleteDoc(doc(col,id))}};
}
async function initStore(){
  const useSB=SBCFG&&SBCFG.url&&SBCFG.anonKey, useFB=!useSB&&FBCFG&&FBCFG.apiKey;
  try{store.adapter=useSB?await makeSupabaseAdapter(SBCFG):useFB?await makeFirebaseAdapter(FBCFG):makeLocalAdapter();}
  catch(e){console.error('[comments] shared failed, using local:',e);store.adapter=makeLocalAdapter();toast('Shared mode unavailable — using this device only');}
  const shared=store.adapter.kind==='shared';
  modePill.className='mode-pill '+(shared?'mode-shared':'mode-local');
  modeText.textContent=shared?'Shared · live':'Local · this device';
  modePill.title=shared?'Comments are saved to your shared database and visible to everyone, live.':'Comments are saved in this browser only. Add a Supabase (or Firebase) config to share them.';
  store.adapter.subscribe(list=>{comments=(list||[]).slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));DOCS.forEach(d=>renderPins(d.id));renderRail();updateCounts();});
}

/* ============================ PDF RENDERING ============================ */
let pdfjsLib=null;
const MAXW=1180;

function docWidth(st){
  const avail=st.scrollEl.clientWidth-32;
  return Math.max(280, Math.min(avail, MAXW)*zoom);
}
async function buildDoc(def){
  const scrollEl=document.createElement('div');
  scrollEl.className='pdf-scroll'; scrollEl.hidden=(def.id!==activeDoc);
  const inner=document.createElement('div'); inner.className='pdf-inner';
  scrollEl.appendChild(inner); stage.appendChild(scrollEl);
  const st=docState[def.id]={def,pdf:null,pages:[],scrollEl,inner,io:null};

  const pdf=await pdfjsLib.getDocument(def.src).promise; st.pdf=pdf;
  for(let n=1;n<=pdf.numPages;n++){
    const page=await pdf.getPage(n);
    const vp=page.getViewport({scale:1});
    const wrap=document.createElement('div'); wrap.className='pdf-page'; wrap.dataset.page=n; wrap.dataset.idx=(n-1);
    wrap.innerHTML='<div class="ph">PAGE '+n+'</div><span class="pdf-pagenum">'+n+' / '+pdf.numPages+'</span>';
    inner.appendChild(wrap);
    st.pages.push({n,page,baseW:vp.width,baseH:vp.height,wrap,canvas:null,rendered:false,rendering:false});
  }
  sizePages(st);
  st.io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)renderPage(st,+e.target.dataset.idx);});},{root:scrollEl,rootMargin:'800px 0px'});
  st.pages.forEach(pg=>st.io.observe(pg.wrap));
  scrollEl.addEventListener('scroll',()=>{if(def.id===activeDoc)updatePageInd(st);},{passive:true});
  return st;
}
function sizePages(st){
  const w=docWidth(st);
  st.pages.forEach(pg=>{const h=w*pg.baseH/pg.baseW;pg.wrap.style.width=w+'px';pg.wrap.style.height=h+'px';});
}
async function renderPage(st,i){
  const pg=st.pages[i]; if(!pg||pg.rendered||pg.rendering)return; pg.rendering=true;
  const w=docWidth(st), dpr=window.devicePixelRatio||1;
  const vp=pg.page.getViewport({scale:(w/pg.baseW)*dpr});
  let cv=pg.canvas;
  if(!cv){cv=document.createElement('canvas');pg.wrap.appendChild(cv);pg.canvas=cv;}
  cv.width=Math.ceil(vp.width); cv.height=Math.ceil(vp.height);
  try{ await pg.page.render({canvasContext:cv.getContext('2d',{alpha:false}),viewport:vp}).promise;
       const ph=pg.wrap.querySelector('.ph'); if(ph)ph.remove(); pg.rendered=true; }
  catch(e){ console.error('render page',pg.n,e); }
  pg.rendering=false;
}
function updatePageInd(st){
  const mid=st.scrollEl.scrollTop+st.scrollEl.clientHeight/2; let cur=1;
  for(const pg of st.pages){const top=pg.wrap.offsetTop, bot=top+pg.wrap.offsetHeight; if(mid>=top&&mid<bot){cur=pg.n;break;} if(mid>=bot)cur=pg.n;}
  pageInd.textContent='Page '+cur+' / '+st.pdf.numPages;
}
function reflow(){
  Object.values(docState).forEach(st=>{
    sizePages(st);
    st.pages.forEach((pg,idx)=>{ if(pg.rendered||pg.rendering){pg.rendered=false;pg.rendering=false;renderPage(st,idx);} });
  });
}

/* ============================ PINS ============================ */
function pinSVG(sel){const f=sel?'#331047':'#23F3A1',s=sel?'#23F3A1':'#0b7a54';
  return '<svg viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M13 1C6.9 1 2 5.9 2 12c0 7.7 9.4 19 10.2 20 .4.5 1.2.5 1.6 0C14.6 31 24 19.7 24 12 24 5.9 19.1 1 13 1Z" fill="'+f+'" stroke="'+s+'" stroke-width="1.5"/><circle cx="13" cy="12" r="8.5" fill="rgba(255,255,255,.16)"/></svg>';}
function renderPins(docId){
  const st=docState[docId]; if(!st)return;
  st.inner.querySelectorAll('.cd-pin').forEach(n=>n.remove());
  const list=comments.filter(c=>c.version===docId);
  list.forEach((c,i)=>{
    const pg=st.pages[((c.anchor&&c.anchor.page)||1)-1]; if(!pg)return;
    const pin=document.createElement('div');
    pin.className='cd-pin'+(c.resolved?' resolved':'')+(c.id===selectedId?' sel':'');
    pin.style.left=((c.anchor.xPct||0)*100)+'%'; pin.style.top=((c.anchor.yPct||0)*100)+'%';
    pin.innerHTML=pinSVG(c.id===selectedId)+'<span class="num">'+(i+1)+'</span>';
    pin.title=(c.author||'Anonymous')+': '+(c.text||'').slice(0,80);
    pin.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();selectComment(c.id,{fromPin:true});});
    pg.wrap.appendChild(pin);
  });
  if(pending&&pending.version===docId){
    const pg=st.pages[(pending.anchor.page||1)-1];
    if(pg){const p=document.createElement('div');p.className='cd-pin pending sel';p.style.left=(pending.anchor.xPct*100)+'%';p.style.top=(pending.anchor.yPct*100)+'%';p.innerHTML=pinSVG(true)+'<span class="num">+</span>';pg.wrap.appendChild(p);}
  }
}
function armClickHandler(e){
  const wrap=e.target.closest('.pdf-page'); if(!wrap)return;
  e.preventDefault(); e.stopPropagation();
  const r=wrap.getBoundingClientRect();
  const anchor={page:+wrap.dataset.page, xPct:(e.clientX-r.left)/r.width, yPct:(e.clientY-r.top)/r.height};
  pending={version:activeDoc,anchor};
  setArmed(false);
  if(body.classList.contains('rail-collapsed'))setRail(true);
  renderPins(activeDoc); renderRail();
  const ta=document.getElementById('composerText'); if(ta)ta.focus();
}

/* ============================ RAIL ============================ */
function visibleComments(){let l=comments.slice();if(filter==='current')l=l.filter(c=>c.version===activeDoc);else if(filter==='open')l=l.filter(c=>!c.resolved);return l;}
function numberFor(c){const s=comments.filter(x=>x.version===c.version);return s.findIndex(x=>x.id===c.id)+1;}
function renderRail(){
  railList.innerHTML='';
  if(pending)railList.appendChild(composerNode());
  const list=visibleComments();
  if(!list.length&&!pending){
    railList.innerHTML='<div class="empty"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No comments '+(filter==='current'?'on this document':'yet')+'.<br>Click <strong>Comment</strong>, then click anywhere on the report to leave one.</div>';
    return;
  }
  list.forEach(c=>railList.appendChild(cardNode(c)));
}
function composerNode(){
  const el=document.createElement('div'); el.className='composer';
  el.innerHTML='<h3>New comment · '+esc(labelOf(pending.version))+'</h3><p class="hint">Pinned to page '+pending.anchor.page+', where you clicked.</p><textarea class="ta" id="composerText" placeholder="Type your comment…"></textarea><div class="row"><button class="btn-x cancel">Cancel</button><button class="btn-x save">Add comment</button></div>';
  el.querySelector('.cancel').addEventListener('click',()=>{pending=null;DOCS.forEach(d=>renderPins(d.id));renderRail();});
  el.querySelector('.save').addEventListener('click',submitComposer);
  el.querySelector('.ta').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')submitComposer();});
  el.querySelectorAll('.btn-x').forEach(b=>b.style.cssText='appearance:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border:1px solid var(--hair);background:#fff;color:var(--muted);border-radius:8px;padding:7px 12px');
  const s=el.querySelector('.save');s.style.background='var(--ink)';s.style.color='#fff';s.style.borderColor='var(--ink)';
  return el;
}
async function submitComposer(){
  const ta=document.getElementById('composerText'); const text=ta.value.trim(); if(!text){ta.focus();return;}
  const c={id:uid(),version:pending.version,anchor:pending.anchor,author:authorName(),text,createdAt:Date.now(),resolved:false,replies:[]};
  pending=null; await store.adapter.add(c); selectedId=c.id; toast('Comment added');
}
function cardNode(c){
  const el=document.createElement('div');
  el.className='card'+(c.resolved?' resolved':'')+(c.id===selectedId?' active':''); el.dataset.id=c.id;
  const replies=(c.replies||[]).map(r=>'<div class="reply"><div class="avatar">'+initials(r.author||'?')+'</div><div><div><span class="r-nm">'+esc(r.author||'Anonymous')+'</span><span class="r-tm">'+ago(r.createdAt)+'</span></div><div class="r-body">'+esc(r.text)+'</div></div></div>').join('');
  el.innerHTML='<div class="c-top"><div class="avatar">'+initials(c.author||'?')+'</div><div class="c-meta"><span class="nm">'+esc(c.author||'Anonymous')+'</span><span class="tm">'+ago(c.createdAt)+'</span></div><span class="vbadge">'+esc(labelOf(c.version))+'</span></div>'
    +'<div class="c-body">'+esc(c.text)+'</div><div class="pin-ref">📍 Pin '+numberFor(c)+' · p.'+((c.anchor&&c.anchor.page)||1)+(c.resolved?' · resolved':'')+'</div>'
    +(replies?'<div class="replies">'+replies+'</div>':'')
    +'<div class="reply-box"><textarea class="ta" placeholder="Reply…"></textarea><div style="display:flex;gap:6px;justify-content:flex-end"><button class="rcancel">Cancel</button><button class="rsend">Reply</button></div></div>'
    +'<div class="c-actions"><button class="act-reply">Reply</button><button class="act-resolve">'+(c.resolved?'Reopen':'Resolve')+'</button><button class="act-jump">Jump to pin</button><button class="act-del danger">Delete</button></div>';
  el.addEventListener('click',e=>{if(e.target.closest('button')||e.target.closest('textarea'))return;selectComment(c.id);});
  const rbox=el.querySelector('.reply-box');
  el.querySelector('.act-reply').addEventListener('click',e=>{e.stopPropagation();rbox.classList.toggle('open');if(rbox.classList.contains('open'))rbox.querySelector('textarea').focus();});
  el.querySelector('.rcancel').addEventListener('click',e=>{e.stopPropagation();rbox.classList.remove('open');});
  const send=()=>{const t=rbox.querySelector('textarea').value.trim();if(!t)return;store.adapter.addReply(c.id,{author:authorName(),text:t,createdAt:Date.now()});rbox.querySelector('textarea').value='';rbox.classList.remove('open');};
  el.querySelector('.rsend').addEventListener('click',e=>{e.stopPropagation();send();});
  rbox.querySelector('textarea').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.stopPropagation();send();}});
  el.querySelector('.act-resolve').addEventListener('click',e=>{e.stopPropagation();store.adapter.update(c.id,{resolved:!c.resolved});});
  el.querySelector('.act-jump').addEventListener('click',e=>{e.stopPropagation();selectComment(c.id,{jump:true});});
  el.querySelector('.act-del').addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete this comment'+((c.replies||[]).length?' and its replies':'')+'?'))store.adapter.remove(c.id);});
  return el;
}
function selectComment(id,opts={}){
  const c=comments.find(x=>x.id===id); if(!c)return; selectedId=id;
  if(c.version!==activeDoc)setDoc(c.version);
  if(body.classList.contains('rail-collapsed'))setRail(true);
  DOCS.forEach(d=>renderPins(d.id)); renderRail();
  const st=docState[c.version];
  if(st){ const idx=((c.anchor&&c.anchor.page)||1)-1, pg=st.pages[idx];
    if(pg){ renderPage(st,idx);
      const top=pg.wrap.offsetTop + ((c.anchor&&c.anchor.yPct)||0)*pg.wrap.offsetHeight - 140;
      st.scrollEl.scrollTo({top:Math.max(0,top),behavior:'smooth'}); } }
  const card=railList.querySelector('.card[data-id="'+id+'"]'); if(card&&!opts.fromPin)card.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function updateCounts(){const t=comments.length,o=comments.filter(c=>!c.resolved).length;countBadge.textContent=countBadgeF.textContent=t;railCount.textContent=o+' open'+(t?' · '+t+' total':'');}

/* ============================ CONTROLS ============================ */
function buildSeg(){
  if(DOCS.length<2){ brandTitle.textContent=DOCS[0].label; return; }
  segEl.classList.add('show'); brandTitle.textContent='Board Review';
  DOCS.forEach(d=>{const b=document.createElement('button');b.textContent=d.label;b.dataset.id=d.id;b.setAttribute('aria-pressed',d.id===activeDoc);b.addEventListener('click',()=>setDoc(d.id));segEl.appendChild(b);});
}
function setDoc(id){
  activeDoc=id;
  DOCS.forEach(d=>{ if(docState[d.id]) docState[d.id].scrollEl.hidden=(d.id!==id); });
  [...segEl.children].forEach(b=>b.setAttribute('aria-pressed',b.dataset.id===id));
  if(docState[id])updatePageInd(docState[id]);
  if(armed){armClickCleanup();armClickSetup();}
  renderRail();
}
function armClickSetup(){ const st=docState[activeDoc]; if(st) st.scrollEl.addEventListener('click',armClickHandler,true); }
function armClickCleanup(){ Object.values(docState).forEach(st=>st.scrollEl.removeEventListener('click',armClickHandler,true)); }
function setArmed(on){armed=on;commentBtn.setAttribute('aria-pressed',on);body.classList.toggle('arming',on);if(on)armClickSetup();else armClickCleanup();}
commentBtn.addEventListener('click',()=>setArmed(!armed));
function setRail(open){body.classList.toggle('rail-collapsed',!open);railToggle.setAttribute('aria-pressed',open);}
railToggle.addEventListener('click',()=>setRail(body.classList.contains('rail-collapsed')));
railToggleF.addEventListener('click',()=>setRail(true));
filterBtns.forEach(b=>b.addEventListener('click',()=>{filter=b.dataset.f;filterBtns.forEach(x=>x.setAttribute('aria-pressed',x===b));renderRail();}));

document.getElementById('zoomIn').addEventListener('click',()=>{zoom=Math.min(2.2,zoom+0.15);reflow();});
document.getElementById('zoomOut').addEventListener('click',()=>{zoom=Math.max(0.5,zoom-0.15);reflow();});

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)){if(e.key==='Escape')document.activeElement.blur();return;}
  if(e.key>='1'&&e.key<='9'){const d=DOCS[+e.key-1];if(d)setDoc(d.id);}
  else if(e.key.toLowerCase()==='c')setArmed(!armed);
  else if(e.key==='Escape'){if(pending){pending=null;DOCS.forEach(d=>renderPins(d.id));renderRail();}if(armed)setArmed(false);}
});
let rT; window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(reflow,160);});

/* ============================ BOOT ============================ */
(async function(){
  try{
    pdfjsLib=await import(window.PDFJS_SRC);
    pdfjsLib.GlobalWorkerOptions.workerSrc=window.PDFJS_WORKER;
  }catch(e){ loadingEl.innerHTML='<div style="max-width:340px;text-align:center;color:#c0392b">Could not load the PDF engine (PDF.js). Check your internet connection or the PDFJS_SRC setting.</div>'; console.error(e); return; }
  buildSeg();
  try{
    for(const d of DOCS){ await buildDoc(d); }
    const first=docState[activeDoc]; if(first){ await renderPage(first,0); updatePageInd(first); }
    loadingEl.remove();
  }catch(e){ loadingEl.innerHTML='<div style="max-width:340px;text-align:center;color:#c0392b">Could not load the PDF. Make sure the file exists next to this page.</div>'; console.error(e); }
  initStore();
})();
</script>
