<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consumer Duty Annual Board Report — Review</title>
<style>
  :root{
    --ink:#331047;        /* dark amethyst */
    --ink-2:#4a1d63;
    --green:#23F3A1;      /* aurora green */
    --green-ink:#0b7a54;
    --bg:#F4F2F7;
    --panel:#ffffff;
    --hair:#E5E5E5;
    --muted:#5C5C5C;
    --rail-w:360px;
    --bar-h:58px;
    --font:'Proxima Nova','Helvetica Neue',Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ---------- top bar ---------- */
  .bar{
    height:var(--bar-h);flex:0 0 auto;display:flex;align-items:center;gap:18px;
    padding:0 16px;background:var(--ink);color:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,.15);z-index:40;
  }
  .brand{display:flex;flex-direction:column;line-height:1.05;margin-right:4px;min-width:0}
  .brand .k{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--green)}
  .brand .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* segmented version switch */
  .seg{display:inline-flex;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);
    border-radius:10px;padding:3px;gap:3px}
  .seg button{
    appearance:none;border:0;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.78);
    background:transparent;font-size:12.5px;font-weight:700;letter-spacing:.02em;
    padding:7px 14px;border-radius:7px;transition:background .15s,color .15s;white-space:nowrap;
  }
  .seg button .sub{display:block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-top:1px}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--ink)}
  .seg button[aria-pressed="true"] .sub{opacity:.55}
  .seg button:focus-visible{outline:2px solid var(--green);outline-offset:2px}

  .spacer{flex:1 1 auto}

  .btn{
    appearance:none;font-family:inherit;cursor:pointer;border-radius:9px;font-size:12.5px;font-weight:700;
    padding:8px 13px;display:inline-flex;align-items:center;gap:8px;transition:background .15s,color .15s,border-color .15s;
  }
  .btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .btn-ghost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.20)}
  .btn-ghost:hover{background:rgba(255,255,255,.18)}
  .btn-comment{background:var(--green);color:#062b1e;border:1px solid var(--green)}
  .btn-comment[aria-pressed="true"]{box-shadow:0 0 0 3px rgba(35,243,161,.35)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
  .count-badge{background:rgba(255,255,255,.22);border-radius:20px;font-size:11px;font-weight:800;padding:1px 8px;min-width:20px;text-align:center}

  .mode-pill{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.85)}
  .mode-pill .dot{width:7px;height:7px}
  .mode-shared .dot{background:var(--green)}
  .mode-local .dot{background:#ffcf5c}

  /* ---------- main ---------- */
  .main{flex:1 1 auto;display:flex;min-height:0;position:relative}
  .stage{flex:1 1 auto;position:relative;min-width:0;background:var(--bg)}
  iframe.doc{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  iframe.doc[hidden]{display:none}

  /* comment-mode hint overlay across the stage */
  .arm-hint{
    position:absolute;left:50%;top:14px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;
    padding:9px 16px;border-radius:22px;box-shadow:0 6px 22px rgba(51,16,71,.35);
    z-index:30;display:none;align-items:center;gap:9px;pointer-events:none;
  }
  .arm-hint .k{color:var(--green);font-weight:800}
  body.arming .arm-hint{display:inline-flex}

  /* ---------- comments rail ---------- */
  .rail{
    flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--panel);border-left:1px solid var(--hair);
    display:flex;flex-direction:column;min-height:0;transition:margin-right .22s ease;z-index:20;
  }
  body.rail-collapsed .rail{margin-right:calc(-1 * var(--rail-w))}
  .rail-head{padding:14px 16px 10px;border-bottom:1px solid var(--hair);flex:0 0 auto}
  .rail-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .rail-title h2{margin:0;font-size:14px;font-weight:800;letter-spacing:.01em}
  .rail-title .n{font-size:12px;color:var(--muted);font-weight:700}
  .who{display:flex;align-items:center;gap:8px;margin-top:11px}
  .who label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .who input{flex:1;font-family:inherit;font-size:13px;border:1px solid var(--hair);border-radius:8px;padding:6px 9px;color:var(--ink)}
  .who input:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}

  .filters{display:flex;gap:6px;margin-top:11px}
  .filters button{
    flex:1;appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;
    border:1px solid var(--hair);background:#fafafa;color:var(--muted);border-radius:7px;padding:6px 4px;
  }
  .filters button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .filters button:focus-visible{outline:2px solid var(--green);outline-offset:1px}

  .rail-list{flex:1 1 auto;overflow-y:auto;padding:12px 14px 40px}

  .empty{color:var(--muted);font-size:13px;line-height:1.6;text-align:center;padding:34px 18px}
  .empty svg{opacity:.5;margin-bottom:10px}

  .card{border:1px solid var(--hair);border-radius:12px;padding:12px 13px;margin-bottom:11px;background:#fff;
    transition:box-shadow .15s,border-color .15s;cursor:pointer}
  .card:hover{border-color:#cdbfe0}
  .card.active{border-color:var(--ink);box-shadow:0 0 0 3px rgba(51,16,71,.12)}
  .card.resolved{opacity:.62}
  .card.resolved .c-body{text-decoration:line-through;text-decoration-color:rgba(51,16,71,.35)}
  .c-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .avatar{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
    font-size:10.5px;font-weight:800;color:#fff;background:var(--ink)}
  .c-meta{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .c-meta .nm{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c-meta .tm{font-size:10.5px;color:var(--muted)}
  .vbadge{margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 7px;border-radius:20px;background:#f0ecf5;color:var(--ink)}
  .c-body{font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .pin-ref{font-size:10.5px;color:var(--green-ink);font-weight:700;margin-top:6px;display:inline-flex;align-items:center;gap:5px}

  .replies{margin-top:9px;border-top:1px solid var(--hair);padding-top:9px;display:flex;flex-direction:column;gap:9px}
  .reply{display:flex;gap:8px}
  .reply .avatar{width:20px;height:20px;font-size:9px;background:var(--ink-2)}
  .reply .r-body{font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .reply .r-nm{font-size:11px;font-weight:800}.reply .r-tm{font-size:10px;color:var(--muted);margin-left:6px;font-weight:600}

  .c-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .c-actions button{appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;
    border:1px solid var(--hair);background:#fff;color:var(--muted);border-radius:7px;padding:5px 9px}
  .c-actions button:hover{border-color:#cdbfe0;color:var(--ink)}
  .c-actions button.primary{background:var(--ink);border-color:var(--ink);color:#fff}
  .c-actions button.danger:hover{border-color:#e6b0aa;color:#c0392b}
  .c-actions button:focus-visible{outline:2px solid var(--green);outline-offset:1px}

  .reply-box{display:none;margin-top:9px;gap:6px;flex-direction:column}
  .reply-box.open{display:flex}
  textarea.ta{font-family:inherit;font-size:12.5px;line-height:1.5;border:1px solid var(--hair);border-radius:9px;
    padding:8px 10px;resize:vertical;min-height:54px;color:var(--ink);width:100%}
  textarea.ta:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}

  /* composer (new comment) */
  .composer{border:1px solid var(--ink);border-radius:12px;padding:12px 13px;margin-bottom:12px;background:#fbf9ff;
    box-shadow:0 6px 20px rgba(51,16,71,.10)}
  .composer h3{margin:0 0 4px;font-size:12.5px;font-weight:800}
  .composer .hint{font-size:11px;color:var(--muted);margin:0 0 9px}
  .composer .row{display:flex;gap:7px;margin-top:9px;justify-content:flex-end}

  /* toast */
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* floating "show comments" button when rail collapsed */
  .rail-toggle-float{position:absolute;top:12px;right:12px;z-index:25;display:none}
  body.rail-collapsed .rail-toggle-float{display:inline-flex}

  @media (max-width:820px){
    :root{--rail-w:88vw}
    .brand .t{display:none}
    .seg button .sub{display:none}
    .rail{position:absolute;inset:var(--bar-h) 0 0 auto;height:auto;box-shadow:-8px 0 30px rgba(0,0,0,.14)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;scroll-behavior:auto !important}}
</style>

<body class="rail-collapsed">

  <header class="bar">
    <div class="brand">
      <span class="k">Consumer Duty · Board Review</span>
      <span class="t" id="brandTitle">Annual Board Report</span>
    </div>

    <div class="seg" role="group" aria-label="Choose version">
      <button id="segA" aria-pressed="true"  data-v="A">Version A<span class="sub" id="subA">Board pack</span></button>
      <button id="segB" aria-pressed="false" data-v="B">Version B<span class="sub" id="subB">Reading view</span></button>
    </div>

    <div class="spacer"></div>

    <span class="mode-pill mode-local" id="modePill" title="Where comments are stored">
      <span class="dot"></span><span id="modeText">Local</span>
    </span>

    <button class="btn btn-comment" id="commentToggle" aria-pressed="false" title="Add a comment (C)">
      <span class="dot"></span> Comment

    <button class="btn btn-ghost" id="railToggle" aria-pressed="false">

  </header>

  <div class="main">
    <div class="stage" id="stage">
      <iframe class="doc" id="frameA" src="version-a.html" title="Version A — Consumer Duty Annual Board Report"></iframe>
      <iframe class="doc" id="frameB" src="version-b.html" title="Version B — Consumer Duty Annual Board Report" hidden></iframe>

      <div class="arm-hint"><span class="k">Comment mode</span> — click anywhere on the report to drop a pin · <span class="k">Esc</span> to cancel</div>

      <button class="btn btn-ghost rail-toggle-float" id="railToggleFloat">Comments <span class="count-badge" id="countBadgeFloat">0</span></button>

    <aside class="rail" aria-label="Comments">
      <div class="rail-head">
        <div class="rail-title">

        </div>

          <label for="authorInput">You</label>
          <input id="authorInput" type="text" placeholder="Your name" autocomplete="name" maxlength="40">
        </div>
        <div class="filters" role="group" aria-label="Filter comments">
          <button data-f="current" aria-pressed="true">This version</button>
          <button data-f="open" aria-pressed="false">Open</button>
          <button data-f="all" aria-pressed="false">All</button>
        </div>
      </div>
      <div class="rail-list" id="railList"></div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════════════════════════════════
     CONFIG — edit these two blocks only.
     1) VERSION_LABELS: change the button captions if you like.
     2) FIREBASE_CONFIG: leave blank to store comments on each person's own
        device (localStorage). Paste your Firebase web-app config to make
        comments SHARED and LIVE across everyone. See the README for the
        5-minute setup. Nothing else needs changing.
════════════════════════════════════════════════════════════════════ -->
<script>
  window.VERSION_LABELS = {
    A: { name: "Version A", sub: "Board pack" },
    B: { name: "Version B", sub: "Reading view" }
  };

  window.FIREBASE_CONFIG = {
    // apiKey: "…",
    // authDomain: "…",
    // projectId: "…",
    // storageBucket: "…",
    // messagingSenderId: "…",
    // appId: "…"
  };
</script>

<script type="module">
/* =======================================================================
   Consumer Duty Board Review — wrapper logic
   - Loads each original report unchanged in an iframe (source never edited)
   - Version A / B switch
   - Pin-based comments injected as an OVERLAY at runtime (report content
     itself is never modified), stored locally or shared via Firebase.
   ======================================================================= */

const LABELS = window.VERSION_LABELS;
const FBCFG  = window.FIREBASE_CONFIG || {};
const uid = () => (crypto.randomUUID ? crypto.randomUUID()
                  : Date.now() + '-' + Math.random().toString(36).slice(2));

/* ---------- DOM refs ---------- */
const body        = document.body;
const frames      = { A: document.getElementById('frameA'), B: document.getElementById('frameB') };
const segBtns     = { A: document.getElementById('segA'),   B: document.getElementById('segB') };
const commentBtn  = document.getElementById('commentToggle');
const railToggle  = document.getElementById('railToggle');
const railToggleF = document.getElementById('railToggleFloat');
const railList    = document.getElementById('railList');
const railCount   = document.getElementById('railCount');
const countBadge  = document.getElementById('countBadge');
const countBadgeF = document.getElementById('countBadgeFloat');
const authorInput = document.getElementById('authorInput');
const filterBtns  = [...document.querySelectorAll('.filters button')];
const toastEl     = document.getElementById('toast');
const modePill    = document.getElementById('modePill');
const modeText    = document.getElementById('modeText');

/* apply configurable labels */
document.getElementById('subA').textContent = LABELS.A.sub;
document.getElementById('subB').textContent = LABELS.B.sub;
segBtns.A.childNodes[0].nodeValue = LABELS.A.name;
segBtns.B.childNodes[0].nodeValue = LABELS.B.name;

/* ---------- state ---------- */
let comments   = [];
let activeVer  = 'A';
let armed      = false;                 // comment placement mode
let filter     = 'current';
let selectedId = null;
let pending    = null;                   // {version, anchor} awaiting text
const store    = { adapter: null };
const AUTHOR_KEY = 'cd_report_author';

authorInput.value = localStorage.getItem(AUTHOR_KEY) || '';
authorInput.addEventListener('input', () => localStorage.setItem(AUTHOR_KEY, authorInput.value.trim()));
function authorName(){ return (authorInput.value.trim() || 'Anonymous'); }

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

/* ---------- time-ago ---------- */
function ago(ts){
  const s = Math.max(1, Math.floor((Date.now() - ts) / 1000));
  if (s < 60) return 'just now';
  const m = Math.floor(s/60); if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h/24); if (d < 7)  return d + 'd ago';
  return new Date(ts).toLocaleDateString(undefined,{day:'numeric',month:'short'});
}
function initials(n){
  const p = n.trim().split(/\s+/); if(!p[0]) return '?';
  return ((p[0][0]||'') + (p.length>1 ? p[p.length-1][0] : '')).toUpperCase();
}

/* ============================ STORAGE ============================ */
function makeLocalAdapter(){
  const KEY = 'cd_report_comments_v1';
  const subs = [];
  const read  = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
  const write = a => { localStorage.setItem(KEY, JSON.stringify(a)); emit(); };
  const emit  = () => { const a = read(); subs.forEach(cb => cb(a)); };
  window.addEventListener('storage', e => { if (e.key === KEY) emit(); });
  return {
    kind: 'local',
    subscribe(cb){ subs.push(cb); cb(read()); },
    async add(c){ const a = read(); a.push(c); write(a); },
    async update(id, patch){ const a = read(); const i = a.findIndex(x=>x.id===id); if(i>=0){ a[i] = {...a[i], ...patch}; write(a);} },
    async addReply(id, r){ const a = read(); const i = a.findIndex(x=>x.id===id); if(i>=0){ a[i].replies = [...(a[i].replies||[]), r]; write(a);} },
    async remove(id){ write(read().filter(x=>x.id!==id)); }
  };
}

async function makeFirebaseAdapter(cfg){
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
  const { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, arrayUnion }
    = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
  const app = initializeApp(cfg);
  const db  = getFirestore(app);
  const col = collection(db, 'cd_report_comments');
  return {
    kind: 'shared',
    subscribe(cb){ onSnapshot(col, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() })))); },
    async add(c){ const { id, ...rest } = c; await setDoc(doc(col, id), rest); },
    async update(id, patch){ await updateDoc(doc(col, id), patch); },
    async addReply(id, r){ await updateDoc(doc(col, id), { replies: arrayUnion(r) }); },
    async remove(id){ await deleteDoc(doc(col, id)); }
  };
}

async function initStore(){
  const useFB = FBCFG && FBCFG.apiKey;
  try {
    store.adapter = useFB ? await makeFirebaseAdapter(FBCFG) : makeLocalAdapter();
  } catch (e){
    console.error('[comments] shared mode failed, falling back to local:', e);
    store.adapter = makeLocalAdapter();
    toast('Shared mode unavailable — using this device only');
  }
  const shared = store.adapter.kind === 'shared';
  modePill.className = 'mode-pill ' + (shared ? 'mode-shared' : 'mode-local');
  modeText.textContent = shared ? 'Shared · live' : 'Local · this device';
  modePill.title = shared
    ? 'Comments are saved to your shared database and visible to everyone, live.'
    : 'Comments are saved in this browser only. Add a Firebase config to share them.';
  store.adapter.subscribe(list => {
    comments = (list || []).slice().sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    renderPins('A'); renderPins('B'); renderRail(); updateCounts();
  });
}

/* ============================ ANCHORING ============================
   Robust anchor: CSS-path to the clicked element + fractional offset,
   with a whole-page percentage as fallback. Both stored; content is
   never altered — pins are appended as overlay nodes at render time. */
function cssPath(el, root){
  const parts = [];
  let node = el;
  while (node && node !== root && node.nodeType === 1 && parts.length < 12){
    let seg = node.tagName.toLowerCase();
    const parent = node.parentElement;
    if (parent){
      const sames = [...parent.children].filter(c => c.tagName === node.tagName);
      if (sames.length > 1) seg += ':nth-of-type(' + (sames.indexOf(node)+1) + ')';
    }
    parts.unshift(seg);
    node = node.parentElement;
  }
  return parts.join('>');
}
function scrollEl(doc){ return doc.scrollingElement || doc.documentElement || doc.body; }

function computeAnchor(doc, e){
  const se = scrollEl(doc);
  const W = se.scrollWidth  || 1;
  const H = se.scrollHeight || 1;
  const pageX = (e.clientX + (se.scrollLeft||0));
  const pageY = (e.clientY + (se.scrollTop||0));
  const anchor = { pageXPct: pageX / W, pageYPct: pageY / H, selector: null, fracX: 0, fracY: 0 };
  // try element-relative (survives width/zoom changes better)
  const path = e.composedPath ? e.composedPath() : [];
  const lightTarget = path.find(n => n && n.nodeType === 1 && n.getRootNode && n.getRootNode() === doc) || e.target;
  if (lightTarget && lightTarget.nodeType === 1 && lightTarget !== doc.body && lightTarget !== doc.documentElement){
    try {
      const sel = cssPath(lightTarget, doc.body);
      if (sel && doc.body.querySelector(sel) === lightTarget){
        const r = lightTarget.getBoundingClientRect();
        anchor.selector = sel;
        anchor.fracX = r.width  ? (e.clientX - r.left) / r.width  : 0.5;
        anchor.fracY = r.height ? (e.clientY - r.top)  / r.height : 0.5;
      }
    } catch(_){}
  }
  return anchor;
}

function anchorToXY(doc, a){
  const se = scrollEl(doc);
  if (a.selector){
    try {
      const el = doc.body.querySelector(a.selector);
      if (el){
        const r = el.getBoundingClientRect();
        return {
          x: r.left + (se.scrollLeft||0) + (a.fracX||0) * r.width,
          y: r.top  + (se.scrollTop ||0) + (a.fracY||0) * r.height
        };
      }
    } catch(_){}
  }
  return { x: (a.pageXPct||0) * (se.scrollWidth||1), y: (a.pageYPct||0) * (se.scrollHeight||1) };
}

/* ============================ IFRAME SETUP ============================ */
const ready = { A: false, B: false };

function styleInject(doc){
  if (doc.getElementById('cd-pin-style')) return;
  const st = doc.createElement('style');
  st.id = 'cd-pin-style';
  st.textContent = `
    .cd-pin{position:absolute;z-index:2147483000;transform:translate(-50%,-100%);
      width:26px;height:34px;cursor:pointer;font-family:'Proxima Nova','Helvetica Neue',Arial,sans-serif;
      filter:drop-shadow(0 3px 5px rgba(51,16,71,.35));}
    .cd-pin svg{width:26px;height:34px;display:block}
    .cd-pin .num{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#062b1e;line-height:18px}
    .cd-pin.resolved{opacity:.45;filter:none}
    .cd-pin.sel .num{color:#fff}
    .cd-pin.pending{animation:cdpulse 1.1s ease-in-out infinite}
    @keyframes cdpulse{0%,100%{transform:translate(-50%,-100%) scale(1)}50%{transform:translate(-50%,-100%) scale(1.14)}}
    @media (prefers-reduced-motion:reduce){.cd-pin.pending{animation:none}}
  `;
  (doc.head || doc.documentElement).appendChild(st);
}

function pinSVG(sel){
  const fill = sel ? '#331047' : '#23F3A1';
  const stroke = sel ? '#23F3A1' : '#0b7a54';
  return `<svg viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M13 1C6.9 1 2 5.9 2 12c0 7.7 9.4 19 10.2 20 .4.5 1.2.5 1.6 0C14.6 31 24 19.7 24 12 24 5.9 19.1 1 13 1Z"
      fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
    <circle cx="13" cy="12" r="8.5" fill="rgba(255,255,255,.16)"/>
  </svg>`;
}

function attachBodyRO(ver, doc){
  if (!doc.body) return;
  if (doc._cdBodyRO) { try { doc._cdBodyRO.disconnect(); } catch(_){} }
  try {
    const ro = new ResizeObserver(() => renderPins(ver));
    ro.observe(doc.body);
    doc._cdBodyRO = ro;
  } catch(_){}
}

function onFrameLoad(ver){
  const doc = frames[ver].contentDocument;
  if (!doc){ return; } // cross-origin (only if opened via file:// in some browsers)
  ready[ver] = true;

  const refresh = () => { styleInject(doc); renderPins(ver); attachBodyRO(ver, doc); };

  // Some exports are self-unpacking bundles that rebuild themselves by replacing
  // the whole <html> element after load. Watch for that swap (and any later ones)
  // and re-inject our pin styles + pins so comments never disappear.
  if (!doc._cdDocObs){
    try {
      const mo = new MutationObserver(() => setTimeout(refresh, 30));
      mo.observe(doc, { childList: true });   // fires when documentElement is replaced
      doc._cdDocObs = mo;
    } catch(_){}
  }

  // delayed passes catch late async rendering (custom elements / bundle unpack)
  [150, 500, 1200, 2500, 4000].forEach(t => setTimeout(refresh, t));
  refresh();
}
frames.A.addEventListener('load', () => onFrameLoad('A'));
frames.B.addEventListener('load', () => onFrameLoad('B'));

/* place-a-pin: arm a one-shot capture click inside the active iframe */
function armPlacement(){
  const doc = frames[activeVer].contentDocument;
  if (!doc){ toast('Open this page through a web address (not a local file) to add comments.'); disarm(); return; }
  doc.body.style.cursor = 'crosshair';
  const handler = (e) => {
    e.preventDefault(); e.stopPropagation();
    doc.removeEventListener('click', handler, true);
    doc.body.style.cursor = '';
    const anchor = computeAnchor(doc, e);
    pending = { version: activeVer, anchor };
    setArmed(false);
    if (body.classList.contains('rail-collapsed')) setRail(true);
    renderPins(activeVer);
    renderRail();
    const ta = document.getElementById('composerText');
    if (ta) ta.focus();
  };
  doc.addEventListener('click', handler, true);
  doc._cdHandler = handler;
}
function cancelPlacement(){
  const doc = frames[activeVer].contentDocument;
  if (doc && doc._cdHandler){ doc.removeEventListener('click', doc._cdHandler, true); doc.body.style.cursor=''; doc._cdHandler=null; }
}

/* ============================ RENDER: PINS ============================ */
function renderPins(ver){
  const frame = frames[ver];
  const doc = frame.contentDocument;
  if (!doc || !doc.body) return;
  doc.body.querySelectorAll('.cd-pin').forEach(n => n.remove());

  const list = comments.filter(c => c.version === ver);
  list.forEach((c, i) => {
    const { x, y } = anchorToXY(doc, c.anchor || c);
    const pin = doc.createElement('div');
    pin.className = 'cd-pin' + (c.resolved ? ' resolved' : '') + (c.id === selectedId ? ' sel' : '');
    pin.style.left = x + 'px';
    pin.style.top  = y + 'px';
    pin.innerHTML = pinSVG(c.id === selectedId) + `<span class="num">${i+1}</span>`;
    pin.title = (c.author||'Anonymous') + ': ' + (c.text||'').slice(0,80);
    pin.addEventListener('click', (ev) => { ev.preventDefault(); ev.stopPropagation(); selectComment(c.id, {fromPin:true}); });
    doc.body.appendChild(pin);
  });

  // pending (unsaved) pin marker
  if (pending && pending.version === ver){
    const { x, y } = anchorToXY(doc, pending.anchor);
    const p = doc.createElement('div');
    p.className = 'cd-pin pending sel';
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.innerHTML = pinSVG(true) + `<span class="num">+</span>`;
    doc.body.appendChild(p);
  }
}

/* ============================ RENDER: RAIL ============================ */
function visibleComments(){
  let list = comments.slice();
  if (filter === 'current') list = list.filter(c => c.version === activeVer);
  else if (filter === 'open') list = list.filter(c => !c.resolved);
  return list;
}
function numberFor(c){
  const sameVer = comments.filter(x => x.version === c.version);
  return sameVer.findIndex(x => x.id === c.id) + 1;
}

function renderRail(){
  railList.innerHTML = '';

  if (pending){
    railList.appendChild(composerNode());
  }

  const list = visibleComments();
  if (!list.length && !pending){
    railList.innerHTML = `<div class="empty">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      No comments ${filter==='current' ? 'on '+LABELS[activeVer].name : 'yet'}.<br>
      Click <strong>Comment</strong>, then click anywhere on the report to leave one.
    </div>`;
    return;
  }

  list.forEach(c => railList.appendChild(cardNode(c)));
}

function composerNode(){
  const el = document.createElement('div');
  el.className = 'composer';
  el.innerHTML = `
    <h3>New comment on ${LABELS[pending.version].name}</h3>
    <p class="hint">Pinned to the spot you clicked.</p>
    <textarea class="ta" id="composerText" placeholder="Type your comment…"></textarea>
    <div class="row">
      <button class="btn-x cancel">Cancel</button>
      <button class="btn-x save primary">Add comment</button>
    </div>`;
  el.querySelector('.cancel').addEventListener('click', () => { pending = null; renderPins('A'); renderPins('B'); renderRail(); });
  el.querySelector('.save').addEventListener('click', submitComposer);
  el.querySelector('.ta').addEventListener('keydown', e => { if((e.metaKey||e.ctrlKey) && e.key==='Enter') submitComposer(); });
  // style the composer buttons to match .c-actions
  el.querySelectorAll('.btn-x').forEach(b => { b.style.cssText='appearance:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border:1px solid var(--hair);background:#fff;color:var(--muted);border-radius:8px;padding:7px 12px'; });
  const save = el.querySelector('.save'); save.style.background='var(--ink)'; save.style.color='#fff'; save.style.borderColor='var(--ink)';
  return el;
}

async function submitComposer(){
  const ta = document.getElementById('composerText');
  const text = ta.value.trim();
  if (!text){ ta.focus(); return; }
  const c = {
    id: uid(), version: pending.version, anchor: pending.anchor,
    author: authorName(), text, createdAt: Date.now(), resolved: false, replies: []
  };
  pending = null;
  await store.adapter.add(c);
  selectedId = c.id;
  toast('Comment added');
}

function cardNode(c){
  const el = document.createElement('div');
  el.className = 'card' + (c.resolved ? ' resolved' : '') + (c.id === selectedId ? ' active' : '');
  el.dataset.id = c.id;

  const replies = (c.replies || []).map(r => `
    <div class="reply">
      <div class="avatar">${initials(r.author||'?')}</div>
      <div><div><span class="r-nm">${esc(r.author||'Anonymous')}</span><span class="r-tm">${ago(r.createdAt)}</span></div>
      <div class="r-body">${esc(r.text)}</div></div>
    </div>`).join('');

  el.innerHTML = `
    <div class="c-top">
      <div class="avatar">${initials(c.author||'?')}</div>
      <div class="c-meta">
        <span class="nm">${esc(c.author||'Anonymous')}</span>
        <span class="tm">${ago(c.createdAt)}</span>
      </div>
      <span class="vbadge">${LABELS[c.version].name}</span>
    </div>
    <div class="c-body">${esc(c.text)}</div>
    <div class="pin-ref">📍 Pin ${numberFor(c)}${c.resolved ? ' · resolved' : ''}</div>
    ${replies ? `<div class="replies">${replies}</div>` : ''}
    <div class="reply-box">
      <textarea class="ta" placeholder="Reply…"></textarea>
      <div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="rcancel">Cancel</button><button class="rsend primary">Reply</button>
      </div>
    </div>
    <div class="c-actions">
      <button class="act-reply">Reply</button>
      <button class="act-resolve">${c.resolved ? 'Reopen' : 'Resolve'}</button>
      <button class="act-jump">Jump to pin</button>
      <button class="act-del danger">Delete</button>
    </div>`;

  // clicking the card body selects/jumps
  el.addEventListener('click', (e) => {
    if (e.target.closest('button') || e.target.closest('textarea')) return;
    selectComment(c.id);
  });

  const rbox = el.querySelector('.reply-box');
  el.querySelector('.act-reply').addEventListener('click', (e)=>{ e.stopPropagation(); rbox.classList.toggle('open'); if(rbox.classList.contains('open')) rbox.querySelector('textarea').focus(); });
  el.querySelector('.rcancel').addEventListener('click', (e)=>{ e.stopPropagation(); rbox.classList.remove('open'); });
  const send = () => {
    const t = rbox.querySelector('textarea').value.trim(); if(!t) return;
    store.adapter.addReply(c.id, { author: authorName(), text: t, createdAt: Date.now() });
    rbox.querySelector('textarea').value=''; rbox.classList.remove('open');
  };
  el.querySelector('.rsend').addEventListener('click', (e)=>{ e.stopPropagation(); send(); });
  rbox.querySelector('textarea').addEventListener('keydown', e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.stopPropagation();send();} });

  el.querySelector('.act-resolve').addEventListener('click', (e)=>{ e.stopPropagation(); store.adapter.update(c.id, { resolved: !c.resolved }); });
  el.querySelector('.act-jump').addEventListener('click', (e)=>{ e.stopPropagation(); selectComment(c.id, {jump:true}); });
  el.querySelector('.act-del').addEventListener('click', (e)=>{ e.stopPropagation();
    if (confirm('Delete this comment' + ((c.replies||[]).length ? ' and its replies' : '') + '?')) store.adapter.remove(c.id);
  });

  return el;
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ============================ SELECT / JUMP ============================ */
function selectComment(id, opts = {}){
  const c = comments.find(x => x.id === id); if (!c) return;
  selectedId = id;
  if (c.version !== activeVer){ setVersion(c.version); }
  // ensure rail open, filter shows it
  if (body.classList.contains('rail-collapsed')) setRail(true);
  renderPins('A'); renderPins('B'); renderRail();

  // scroll iframe to pin
  const frame = frames[c.version];
  const doc = frame.contentDocument;
  if (doc){
    const { y } = anchorToXY(doc, c.anchor || c);
    (frame.contentWindow || window).scrollTo({ top: Math.max(0, y - 140), behavior: 'smooth' });
  }
  // scroll rail card into view
  const card = railList.querySelector(`.card[data-id="${id}"]`);
  if (card && !opts.fromPin) card.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

/* ============================ COUNTS ============================ */
function updateCounts(){
  const total = comments.length;
  const open  = comments.filter(c => !c.resolved).length;
  countBadge.textContent = countBadgeF.textContent = total;
  railCount.textContent = open + ' open' + (total ? ' · ' + total + ' total' : '');
}

/* ============================ CONTROLS ============================ */
function setVersion(v){
  activeVer = v;
  frames.A.hidden = v !== 'A';
  frames.B.hidden = v !== 'B';
  segBtns.A.setAttribute('aria-pressed', v === 'A');
  segBtns.B.setAttribute('aria-pressed', v === 'B');
  if (armed){ cancelPlacement(); armPlacement(); }   // re-arm on the newly visible frame
  renderRail();
}
segBtns.A.addEventListener('click', () => setVersion('A'));
segBtns.B.addEventListener('click', () => setVersion('B'));

function setArmed(on){
  armed = on;
  commentBtn.setAttribute('aria-pressed', on);
  body.classList.toggle('arming', on);
  if (on) armPlacement(); else cancelPlacement();
}
function disarm(){ setArmed(false); }
commentBtn.addEventListener('click', () => setArmed(!armed));

function setRail(open){
  body.classList.toggle('rail-collapsed', !open);
  railToggle.setAttribute('aria-pressed', open);
}
railToggle.addEventListener('click', () => setRail(body.classList.contains('rail-collapsed')));
railToggleF.addEventListener('click', () => setRail(true));

filterBtns.forEach(b => b.addEventListener('click', () => {
  filter = b.dataset.f;
  filterBtns.forEach(x => x.setAttribute('aria-pressed', x === b));
  renderRail();
}));

/* keyboard: 1/2 switch, C comment, Esc cancel */
document.addEventListener('keydown', (e) => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
    if (e.key === 'Escape') document.activeElement.blur();
    return;
  }
  if (e.key === '1') setVersion('A');
  else if (e.key === '2') setVersion('B');
  else if (e.key.toLowerCase() === 'c') setArmed(!armed);
  else if (e.key === 'Escape'){ if (pending){ pending=null; renderPins('A'); renderPins('B'); renderRail(); } if (armed) setArmed(false); }
});

/* reposition pins when the wrapper window resizes */
let rT;
window.addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(() => { renderPins('A'); renderPins('B'); }, 120); });

/* ---------- go ---------- */
initStore();
</script>
</body>
