<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consumer Duty Annual Report — Review</title>
<style>
  :root{
    --ink:#331047; --ink-2:#4a1d63; --green:#23F3A1; --green-ink:#0b7a54;
    --bg:#e9e6ef; --panel:#ffffff; --hair:#E5E5E5; --muted:#5C5C5C;
    --rail-w:360px; --bar-h:58px;
    --font:'Proxima Nova','Helvetica Neue',Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

  .bar{height:var(--bar-h);flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:0 16px;background:var(--ink);color:#fff;box-shadow:0 1px 0 rgba(0,0,0,.15);z-index:40}
  .brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
  .brand .k{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--green)}
  .brand .t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw}
  .seg{display:none;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:3px;gap:3px}
  .seg.show{display:inline-flex}
  .seg button{appearance:none;border:0;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.78);background:transparent;font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:7px;white-space:nowrap}
  .seg button[aria-pressed="true"]{background:#fff;color:var(--ink)}
  .seg button:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .spacer{flex:1 1 auto}

  .zoom{display:inline-flex;align-items:center;gap:2px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:9px;padding:2px}
  .zoom button{appearance:none;border:0;background:transparent;color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;width:28px;height:28px;border-radius:6px}
  .zoom button:hover{background:rgba(255,255,255,.15)}
  .zoom .pg{font-size:11px;color:rgba(255,255,255,.82);font-weight:700;padding:0 8px;white-space:nowrap;min-width:74px;text-align:center}

  .btn{appearance:none;font-family:inherit;cursor:pointer;border-radius:9px;font-size:12.5px;font-weight:700;padding:8px 13px;display:inline-flex;align-items:center;gap:8px}
  .btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .btn-ghost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.20)}
  .btn-ghost:hover{background:rgba(255,255,255,.18)}
  .btn-comment{background:var(--green);color:#062b1e;border:1px solid var(--green)}
  .btn-comment[aria-pressed="true"]{box-shadow:0 0 0 3px rgba(35,243,161,.35)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
  .count-badge{background:rgba(255,255,255,.22);border-radius:20px;font-size:11px;font-weight:800;padding:1px 8px;min-width:20px;text-align:center}
  .mode-pill{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.85)}
  .mode-shared .dot{background:var(--green)} .mode-local .dot{background:#ffcf5c}

  .main{flex:1 1 auto;display:flex;min-height:0;position:relative}
  .stage{flex:1 1 auto;position:relative;min-width:0}
  .pdf-scroll{position:absolute;inset:0;overflow:auto;padding:22px 16px 60px;scroll-behavior:smooth}
  .pdf-scroll[hidden]{display:none}
  .pdf-inner{display:flex;flex-direction:column;align-items:center;gap:18px}
  .pdf-page{position:relative;background:#fff;box-shadow:0 4px 18px rgba(51,16,71,.14);border-radius:2px;overflow:hidden}
  .pdf-page canvas{display:block;width:100%;height:100%}
  .pdf-page .ph{position:absolute;inset:0;display:grid;place-items:center;color:#b9adcb;font-size:12px;font-weight:700;letter-spacing:.1em}
  .pdf-pagenum{position:absolute;top:8px;left:8px;background:rgba(51,16,71,.72);color:#fff;font-size:10px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:20px;z-index:5;pointer-events:none}

  body.arming .pdf-scroll{cursor:crosshair}
  .arm-hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:22px;box-shadow:0 6px 22px rgba(51,16,71,.35);z-index:30;display:none;align-items:center;gap:9px;pointer-events:none}
  .arm-hint .k{color:var(--green);font-weight:800}
  body.arming .arm-hint{display:inline-flex}

  .cd-pin{position:absolute;transform:translate(-50%,-100%);width:26px;height:34px;cursor:pointer;z-index:8;filter:drop-shadow(0 3px 5px rgba(51,16,71,.35))}
  .cd-pin svg{width:26px;height:34px;display:block}
  .cd-pin .num{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#062b1e;line-height:18px}
  .cd-pin.sel .num{color:#fff}
  .cd-pin.resolved{opacity:.45;filter:none}
  .cd-pin.pending{animation:cdpulse 1.1s ease-in-out infinite}
  @keyframes cdpulse{0%,100%{transform:translate(-50%,-100%) scale(1)}50%{transform:translate(-50%,-100%) scale(1.14)}}

  .rail-toggle-float{position:absolute;top:12px;right:12px;z-index:25;display:none}
  body.rail-collapsed .rail-toggle-float{display:inline-flex}

  .rail{flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--panel);border-left:1px solid var(--hair);display:flex;flex-direction:column;min-height:0;transition:margin-right .22s ease;z-index:20}
  body.rail-collapsed .rail{margin-right:calc(-1 * var(--rail-w))}
  .rail-head{padding:14px 16px 10px;border-bottom:1px solid var(--hair);flex:0 0 auto}
  .rail-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .rail-title h2{margin:0;font-size:14px;font-weight:800}
  .rail-title .n{font-size:12px;color:var(--muted);font-weight:700}
  .who{display:flex;align-items:center;gap:8px;margin-top:11px}
  .who label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .who input{flex:1;font-family:inherit;font-size:13px;border:1px solid var(--hair);border-radius:8px;padding:6px 9px;color:var(--ink)}
  .who input:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}
  .filters{display:flex;gap:6px;margin-top:11px}
  .filters button{flex:1;appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--hair);background:#fafafa;color:var(--muted);border-radius:7px;padding:6px 4px}
  .filters button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .tools{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:9px}
  .tools button{appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px dashed #cdbfe0;background:#faf7ff;color:var(--ink);border-radius:7px;padding:7px 4px}
  .tools button:hover{background:#f3edfb;border-style:solid}
  .migrate{margin:10px 14px 0;background:#fff7e6;border:1px solid #f0d79a;color:#6b4e12;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5}
  .migrate[hidden]{display:none}
  .migrate button{margin-top:8px;appearance:none;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:800;border:0;background:var(--ink);color:#fff;border-radius:7px;padding:7px 12px}
  .rail-list{flex:1 1 auto;overflow-y:auto;padding:12px 14px 40px}
  .empty{color:var(--muted);font-size:13px;line-height:1.6;text-align:center;padding:34px 18px}
  .empty svg{opacity:.5;margin-bottom:10px}

  .card{border:1px solid var(--hair);border-radius:12px;padding:12px 13px;margin-bottom:11px;background:#fff;transition:box-shadow .15s,border-color .15s;cursor:pointer}
  .card:hover{border-color:#cdbfe0}
  .card.active{border-color:var(--ink);box-shadow:0 0 0 3px rgba(51,16,71,.12)}
  .card.resolved{opacity:.62}
  .card.resolved .c-body{text-decoration:line-through;text-decoration-color:rgba(51,16,71,.35)}
  .c-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .avatar{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:10.5px;font-weight:800;color:#fff;background:var(--ink)}
  .c-meta{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .c-meta .nm{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c-meta .tm{font-size:10.5px;color:var(--muted)}
  .vbadge{margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:#f0ecf5;color:var(--ink)}
  .c-body{font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .pin-ref{font-size:10.5px;color:var(--green-ink);font-weight:700;margin-top:6px;display:inline-flex;align-items:center;gap:5px}
  .replies{margin-top:9px;border-top:1px solid var(--hair);padding-top:9px;display:flex;flex-direction:column;gap:9px}
  .reply{display:flex;gap:8px}
  .reply .avatar{width:20px;height:20px;font-size:9px;background:var(--ink-2)}
  .reply .r-body{font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .reply .r-nm{font-size:11px;font-weight:800}.reply .r-tm{font-size:10px;color:var(--muted);margin-left:6px;font-weight:600}
  .c-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .c-actions button{appearance:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--hair);background:#fff;color:var(--muted);border-radius:7px;padding:5px 9px}
  .c-actions button:hover{border-color:#cdbfe0;color:var(--ink)}
  .c-actions button.danger:hover{border-color:#e6b0aa;color:#c0392b}
  .reply-box{display:none;margin-top:9px;gap:6px;flex-direction:column}
  .reply-box.open{display:flex}
  textarea.ta{font-family:inherit;font-size:12.5px;line-height:1.5;border:1px solid var(--hair);border-radius:9px;padding:8px 10px;resize:vertical;min-height:54px;color:var(--ink);width:100%}
  textarea.ta:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}
  .composer{border:1px solid var(--ink);border-radius:12px;padding:12px 13px;margin-bottom:12px;background:#fbf9ff;box-shadow:0 6px 20px rgba(51,16,71,.10)}
  .composer h3{margin:0 0 4px;font-size:12.5px;font-weight:800}
  .composer .hint{font-size:11px;color:var(--muted);margin:0 0 9px}
  .composer .row{display:flex;gap:7px;margin-top:9px;justify-content:flex-end}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{position:absolute;inset:0;display:grid;place-items:center;z-index:15;color:var(--muted);font-size:13px;font-weight:600;background:var(--bg)}
  .loading .sp{width:26px;height:26px;border:3px solid #cdbfe0;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* amendment markers (distinct from comment pins) */
  .cd-pin.amend svg{display:none}
  .cd-pin.amend{width:24px;height:24px;transform:translate(-50%,-50%);border-radius:6px;background:#E8A33B;border:2px solid #a5701a;display:grid;place-items:center;box-shadow:0 3px 6px rgba(51,16,71,.3)}
  .cd-pin.amend .num{position:static;color:#3a2500;font-size:11px;line-height:1}
  .cd-pin.amend.sel{background:#331047;border-color:#23F3A1}
  .cd-pin.amend.sel .num{color:#fff}
  .vbadge.amend{background:#fbeccf;color:#7a5312}

  /* export modal */
  .modal-back{position:fixed;inset:0;background:rgba(24,8,34,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-back[hidden]{display:none}
  .modal{background:#fff;border-radius:16px;width:min(720px,96vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px 10px}
  .modal-head h3{margin:0;font-size:16px;font-weight:800}
  .modal-sub{margin:3px 0 0;font-size:12px;color:var(--muted)}
  .modal-x{appearance:none;border:0;background:transparent;font-size:24px;line-height:1;color:var(--muted);cursor:pointer;padding:0 4px}
  .modal-tabs{display:flex;gap:6px;padding:0 18px}
  .modal-tabs button{appearance:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border:1px solid var(--hair);background:#fafafa;color:var(--muted);border-radius:8px 8px 0 0;padding:8px 14px;border-bottom:0}
  .modal-tabs button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .modal-text{flex:1 1 auto;margin:0 18px;min-height:280px;border:1px solid var(--hair);border-radius:0 10px 10px 10px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;color:#26123a;resize:none;white-space:pre;overflow:auto}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;padding:14px 18px}
  .modal-actions button{appearance:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;border:1px solid var(--hair);background:#fff;color:var(--ink);border-radius:9px;padding:9px 15px}
  .modal-actions .prim{background:var(--ink);border-color:var(--ink);color:#fff}

  @media (max-width:820px){:root{--rail-w:88vw}.brand .t{display:none}.zoom .pg{min-width:56px}.rail{position:absolute;inset:var(--bar-h) 0 0 auto;box-shadow:-8px 0 30px rgba(0,0,0,.14)}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;scroll-behavior:auto !important}.cd-pin.pending{animation:none}.loading .sp{animation:none}}
</style>
</head>
<body class="rail-collapsed">

  <header class="bar">
    <div class="brand"><span class="k">Consumer Duty · Board Review</span><span class="t" id="brandTitle">Annual Report</span></div>
    <div class="seg" id="seg" role="group" aria-label="Choose version"></div>
    <div class="spacer"></div>
    <div class="zoom" role="group" aria-label="Zoom and page">
      <button id="zoomOut" title="Zoom out" aria-label="Zoom out">&minus;</button>
      <span class="pg" id="pageInd">Page 1 / 1</span>
      <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
    </div>
    <span class="mode-pill mode-local" id="modePill"><span class="dot"></span><span id="modeText">Local</span></span>
    <button class="btn btn-comment" id="commentToggle" aria-pressed="false" title="Add a comment (C)"><span class="dot"></span> Comment</button>
    <button class="btn btn-ghost" id="railToggle" aria-pressed="false">Comments <span class="count-badge" id="countBadge">0</span></button>
  </header>

  <div class="main">
    <div class="stage" id="stage">
      <div class="arm-hint"><span class="k">Comment mode</span> — click anywhere on the report to drop a pin · <span class="k">Esc</span> to cancel</div>
      <button class="btn btn-ghost rail-toggle-float" id="railToggleFloat">Comments <span class="count-badge" id="countBadgeFloat">0</span></button>
      <div class="loading" id="loading"><div><div class="sp"></div>Loading report…</div></div>
    </div>

    <aside class="rail" aria-label="Comments">
      <div class="rail-head">
        <div class="rail-title"><h2>Comments</h2><span class="n" id="railCount">0 open</span></div>
        <div class="who"><label for="authorInput">You</label><input id="authorInput" type="text" placeholder="Your name" autocomplete="name" maxlength="40"></div>
        <div class="filters" role="group" aria-label="Filter comments">
          <button data-f="current" aria-pressed="true">This doc</button>
          <button data-f="open" aria-pressed="false">Open</button>
          <button data-f="all" aria-pressed="false">All</button>
        </div>
        <div class="tools">
          <button id="exportBtn" title="Export all comments (with locations) for editing">⬆ Export for Claude</button>
          <button id="importBtn" title="Import an amendments file onto this document">⬇ Import amendments</button>
          <button id="backupBtn" title="Download a full copy of every comment (safe backup)">💾 Back up comments</button>
          <button id="restoreBtn" title="Restore comments from a backup file (also used to migrate)">♻ Restore</button>
          <input type="file" id="importFile" accept="application/json,.json" hidden>
          <input type="file" id="restoreFile" accept="application/json,.json" hidden>
        </div>
      </div>
      <div class="migrate" id="migrateBanner" hidden></div>
      <div class="rail-list" id="railList"></div>
    </aside>

    <!-- export modal -->
    <div class="modal-back" id="exportModal" hidden>
      <div class="modal">
        <div class="modal-head">
          <div><h3 id="exportTitle">Export comments</h3><p class="modal-sub" id="exportSub"></p></div>
          <button class="modal-x" id="exportClose" aria-label="Close">×</button>
        </div>
        <div class="modal-tabs">
          <button data-fmt="md" aria-pressed="true">For Claude (Markdown)</button>
          <button data-fmt="json" aria-pressed="false">JSON</button>
        </div>
        <textarea id="exportText" class="modal-text" readonly></textarea>
        <div class="modal-actions">
          <button id="exportCopy" class="prim">Copy to clipboard</button>
          <button id="exportDownload">Download file</button>
          <button id="exportPdf">Download annotated PDF</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════════════════════════════════
     CONFIG — edit these blocks only.

     1) DOCS: the PDF(s) to show. One entry = single document (no toggle).
        Add a second entry to get an A/B switch between two PDFs.

     2) Shared comments (optional). Leave both configs blank to store comments
        on each person's own device. Fill SUPABASE_CONFIG (recommended, since
        you already use Supabase) OR FIREBASE_CONFIG to share them live across
        everyone. See the README for the one-time SQL.
════════════════════════════════════════════════════════════════════ -->

  // ─── Firebase (alternative — leave blank if using Supabase) ───

<script type="module">
/* =======================================================================
   Consumer Duty Board Review — PDF viewer + pin comments
   - Renders each PDF page with PDF.js into canvases we control
   - Pin comments overlaid on the pages (the PDF itself is never modified)
   - Comments stored locally or shared live via Supabase / Firebase
   ======================================================================= */

const DOCS  = window.DOCS;
const SBCFG = window.SUPABASE_CONFIG || {};
const FBCFG = window.FIREBASE_CONFIG || {};
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Date.now()+'-'+Math.random().toString(36).slice(2));
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const body=document.body, stage=document.getElementById('stage'), segEl=document.getElementById('seg');
const commentBtn=document.getElementById('commentToggle'), railToggle=document.getElementById('railToggle'), railToggleF=document.getElementById('railToggleFloat');
const railList=document.getElementById('railList'), railCount=document.getElementById('railCount');
const countBadge=document.getElementById('countBadge'), countBadgeF=document.getElementById('countBadgeFloat');
const authorInput=document.getElementById('authorInput'), filterBtns=[...document.querySelectorAll('.filters button')];
const toastEl=document.getElementById('toast'), modePill=document.getElementById('modePill'), modeText=document.getElementById('modeText');
const brandTitle=document.getElementById('brandTitle'), pageInd=document.getElementById('pageInd'), loadingEl=document.getElementById('loading');

let comments=[], activeDoc=DOCS[0].id, armed=false, filter='current', selectedId=null, pending=null;
let zoom=1; const docState={}; const store={adapter:null};
const AUTHOR_KEY='cd_report_author';
authorInput.value=localStorage.getItem(AUTHOR_KEY)||'';
authorInput.addEventListener('input',()=>localStorage.setItem(AUTHOR_KEY,authorInput.value.trim()));
const authorName=()=>authorInput.value.trim()||'Anonymous';

/* ============================ STORAGE ============================ */
function makeLocalAdapter(){
  const KEY='cd_report_comments_v1', subs=[];
  const read=()=>{try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}};
  const write=a=>{localStorage.setItem(KEY,JSON.stringify(a));emit()};
  const emit=()=>{const a=read();subs.forEach(cb=>cb(a))};
  window.addEventListener('storage',e=>{if(e.key===KEY)emit()});
  return{kind:'local',
    subscribe(cb){subs.push(cb);cb(read())},
    async add(c){const a=read();a.push(c);write(a)},
    async update(id,p){const a=read();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i]={...a[i],...p};write(a)}},
    async addReply(id,r){const a=read();const i=a.findIndex(x=>x.id===id);if(i>=0){a[i].replies=[...(a[i].replies||[]),r];write(a)}},
    async remove(id){write(read().filter(x=>x.id!==id))}};
}
async function makeSupabaseAdapter(cfg){
  const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2');
  const sb=createClient(cfg.url,cfg.anonKey), TABLE='cd_report_comments'; let cb=null;
  const row2c=r=>({id:r.id,version:r.version,anchor:r.anchor,author:r.author,text:r.body,createdAt:Number(r.created_at),resolved:!!r.resolved,replies:r.replies||[],kind:r.kind||'comment'});
  async function fetchAll(){const{data,error}=await sb.from(TABLE).select('*');if(error){console.error('[supabase]',error);return[]}return(data||[]).map(row2c);}
  const push=()=>{if(cb)fetchAll().then(cb)};
  return{kind:'shared',
    subscribe(fn){cb=fn;push();sb.channel('cd_rt').on('postgres_changes',{event:'*',schema:'public',table:TABLE},push).subscribe()},
    async add(c){const{error}=await sb.from(TABLE).insert({id:c.id,version:c.version,anchor:c.anchor,author:c.author,body:c.text,created_at:c.createdAt,resolved:c.resolved,replies:c.replies||[],kind:c.kind||'comment'});if(error)console.error(error);push()},
    async update(id,p){const row={};if('resolved'in p)row.resolved=p.resolved;if('text'in p)row.body=p.text;if('replies'in p)row.replies=p.replies;const{error}=await sb.from(TABLE).update(row).eq('id',id);if(error)console.error(error);push()},
    async addReply(id,r){const{data}=await sb.from(TABLE).select('replies').eq('id',id).single();const replies=[...((data&&data.replies)||[]),r];await sb.from(TABLE).update({replies}).eq('id',id);push()},
    async remove(id){await sb.from(TABLE).delete().eq('id',id);push()}};
}
async function makeFirebaseAdapter(cfg){
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
  const {getFirestore,collection,onSnapshot,doc,setDoc,updateDoc,deleteDoc,arrayUnion}=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
  const app=initializeApp(cfg),db=getFirestore(app),col=collection(db,'cd_report_comments');
  return{kind:'shared',
    subscribe(cb){onSnapshot(col,s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))))},
    async add(c){const{id,...rest}=c;await setDoc(doc(col,id),rest)},
    async update(id,p){await updateDoc(doc(col,id),p)},
    async addReply(id,r){await updateDoc(doc(col,id),{replies:arrayUnion(r)})},
    async remove(id){await deleteDoc(doc(col,id))}};
}
async function initStore(){
  const useSB=SBCFG&&SBCFG.url&&SBCFG.anonKey, useFB=!useSB&&FBCFG&&FBCFG.apiKey;
  try{store.adapter=useSB?await makeSupabaseAdapter(SBCFG):useFB?await makeFirebaseAdapter(FBCFG):makeLocalAdapter();}
  catch(e){console.error('[comments] shared failed, using local:',e);store.adapter=makeLocalAdapter();toast('Shared mode unavailable — using this device only');}
  const shared=store.adapter.kind==='shared';

}

/* ============================ PDF RENDERING ============================ */
let pdfjsLib=null;
const MAXW=1180;

function docWidth(st){
  const avail=st.scrollEl.clientWidth-32;
  return Math.max(280, Math.min(avail, MAXW)*zoom);
}
async function buildDoc(def){
  const scrollEl=document.createElement('div');
  scrollEl.className='pdf-scroll'; scrollEl.hidden=(def.id!==activeDoc);
  const inner=document.createElement('div'); inner.className='pdf-inner';
  scrollEl.appendChild(inner); stage.appendChild(scrollEl);
  const st=docState[def.id]={def,pdf:null,pages:[],scrollEl,inner,io:null};

  const pdf=await pdfjsLib.getDocument(def.src).promise; st.pdf=pdf;
  for(let n=1;n<=pdf.numPages;n++){
    const page=await pdf.getPage(n);
    const vp=page.getViewport({scale:1});
    const wrap=document.createElement('div'); wrap.className='pdf-page'; wrap.dataset.page=n; wrap.dataset.idx=(n-1);
    wrap.innerHTML='<div class="ph">PAGE '+n+'</div><span class="pdf-pagenum">'+n+' / '+pdf.numPages+'</span>';
    inner.appendChild(wrap);
    st.pages.push({n,page,baseW:vp.width,baseH:vp.height,wrap,canvas:null,rendered:false,rendering:false});
  }
  sizePages(st);
  st.io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)renderPage(st,+e.target.dataset.idx);});},{root:scrollEl,rootMargin:'800px 0px'});
  st.pages.forEach(pg=>st.io.observe(pg.wrap));
  scrollEl.addEventListener('scroll',()=>{if(def.id===activeDoc)updatePageInd(st);},{passive:true});
  return st;
}
function sizePages(st){
  const w=docWidth(st);
  st.pages.forEach(pg=>{const h=w*pg.baseH/pg.baseW;pg.wrap.style.width=w+'px';pg.wrap.style.height=h+'px';});
}
async function renderPage(st,i){
  const pg=st.pages[i]; if(!pg||pg.rendered||pg.rendering)return; pg.rendering=true;
  const w=docWidth(st), dpr=window.devicePixelRatio||1;
  const vp=pg.page.getViewport({scale:(w/pg.baseW)*dpr});
  let cv=pg.canvas;
  if(!cv){cv=document.createElement('canvas');pg.wrap.appendChild(cv);pg.canvas=cv;}
  cv.width=Math.ceil(vp.width); cv.height=Math.ceil(vp.height);
  try{ await pg.page.render({canvasContext:cv.getContext('2d',{alpha:false}),viewport:vp}).promise;
       const ph=pg.wrap.querySelector('.ph'); if(ph)ph.remove(); pg.rendered=true; }
  catch(e){ console.error('render page',pg.n,e); }
  pg.rendering=false;
}
function updatePageInd(st){
  const mid=st.scrollEl.scrollTop+st.scrollEl.clientHeight/2; let cur=1;
  for(const pg of st.pages){const top=pg.wrap.offsetTop, bot=top+pg.wrap.offsetHeight; if(mid>=top&&mid<bot){cur=pg.n;break;} if(mid>=bot)cur=pg.n;}
  pageInd.textContent='Page '+cur+' / '+st.pdf.numPages;
}
function reflow(){
  Object.values(docState).forEach(st=>{
    sizePages(st);
    st.pages.forEach((pg,idx)=>{ if(pg.rendered||pg.rendering){pg.rendered=false;pg.rendering=false;renderPage(st,idx);} });
  });
}

/* ============================ TEXT EXTRACTION (for export & amendment placement) ============================ */
async function getPageLines(st,n){
  const pg=st.pages[n-1]; if(!pg)return[];
  if(pg.lines)return pg.lines;
  let tc; try{ tc=await pg.page.getTextContent(); }catch(e){ pg.lines=[]; return []; }
  const vp=pg.page.getViewport({scale:1}); pg.vpW=vp.width; pg.vpH=vp.height;
  const raw=tc.items.filter(it=>it.str&&it.str.trim()).map(it=>{const p=pdfjsLib.Util.applyTransform([it.transform[4],it.transform[5]],vp.transform);return{str:it.str,x:p[0],y:p[1],w:(it.width||0)};});
  raw.sort((a,b)=>a.y-b.y||a.x-b.x);
  const lines=[],tol=6;
  raw.forEach(it=>{let l=lines.find(L=>Math.abs(L.y-it.y)<tol);if(!l){l={y:it.y,items:[]};lines.push(l);}l.items.push(it);});
  lines.forEach(l=>{l.items.sort((a,b)=>a.x-b.x);l.text=l.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim();l.x0=Math.min(...l.items.map(i=>i.x));l.x1=Math.max(...l.items.map(i=>i.x+i.w));});
  lines.sort((a,b)=>a.y-b.y); pg.lines=lines; return lines;
}
async function nearestText(st,n,xPct,yPct){
  const lines=await getPageLines(st,n); if(!lines.length)return'';
  const pg=st.pages[n-1], px=(xPct||0)*pg.vpW, py=(yPct||0)*pg.vpH;
  let best=null,bd=1e9;
  lines.forEach(l=>{const cx=Math.max(l.x0,Math.min(px,l.x1));const d=Math.hypot(px-cx,py-l.y);if(d<bd){bd=d;best=l;}});
  let t=best?best.text:'';
  if(best){const idx=lines.indexOf(best);if(t.length<45&&lines[idx+1])t+=' '+lines[idx+1].text;}
  return t.length>170?t.slice(0,170)+'…':t;
}
async function findPhrase(st,n,phrase){
  const lines=await getPageLines(st,n); if(!lines.length||!phrase)return null;
  const norm=s=>s.toLowerCase().replace(/\s+/g,' ').trim(), q=norm(phrase); if(!q)return null;
  const pg=st.pages[n-1], toPct=l=>({xPct:((l.x0+l.x1)/2)/pg.vpW,yPct:l.y/pg.vpH});
  for(const l of lines) if(norm(l.text).includes(q)) return toPct(l);
  for(let i=0;i<lines.length;i++){let acc=norm(lines[i].text);for(let j=i+1;j<Math.min(i+4,lines.length);j++){acc+=' '+norm(lines[j].text);if(acc.includes(q))return toPct(lines[i]);}}
  const few=q.split(' ').slice(0,4).join(' ');
  for(const l of lines) if(norm(l.text).includes(few)) return toPct(l);
  return null;
}

async function buildExport(fmt){
  const docId=activeDoc, st=docState[docId];
  const list=comments.filter(c=>c.version===docId&&(c.kind||'comment')==='comment').slice()
    .sort((a,b)=>(((a.anchor&&a.anchor.page)||0)-((b.anchor&&b.anchor.page)||0))||(a.createdAt-b.createdAt));
  const nearMap=new Map();
  for(const c of list){ nearMap.set(c.id, st? await nearestText(st,(c.anchor&&c.anchor.page)||1,(c.anchor&&c.anchor.xPct)||0,(c.anchor&&c.anchor.yPct)||0):''); }
  const near=c=>nearMap.get(c.id)||'';
  const open=list.filter(c=>!c.resolved).length;
  if(fmt==='json'){
    return JSON.stringify({document:labelOf(docId),exported:new Date().toISOString(),count:list.length,
      comments:list.map(c=>({ref:'p'+((c.anchor&&c.anchor.page)||1)+'#'+numberFor(c),page:(c.anchor&&c.anchor.page)||1,
        position:{xPct:+(((c.anchor&&c.anchor.xPct)||0)).toFixed(3),yPct:+(((c.anchor&&c.anchor.yPct)||0)).toFixed(3)},
        nearbyText:near(c),author:c.author,status:c.resolved?'resolved':'open',comment:c.text,
        replies:(c.replies||[]).map(r=>({author:r.author,text:r.text}))}))},null,2);
  }
  let md='# '+labelOf(docId)+' — review comments\n';
  md+='Exported '+new Date().toLocaleString()+' · '+list.length+' comments ('+open+' open, '+(list.length-open)+' resolved)\n\n';
  md+='> **To edit this document:** apply each comment below. Each item gives the page, a rough position on the page, and the nearby text so you can locate the spot.\n>\n';
  md+='> **When finished, also return an *amendments manifest*** — a JSON array where each entry is:\n';
  md+='> `{ "page": <number>, "anchorText": "<a short exact phrase from the AMENDED text at/near the change>", "title": "<short label>", "detail": "<what changed>", "ref": "<comment ref, e.g. p5#3>" }`\n';
  md+='> Save it as a `.json` file and use **Import amendments** in the viewer to mark every change on the amended PDF.\n\n';
  let cur=null;
  list.forEach(c=>{const pageN=(c.anchor&&c.anchor.page)||1;
    if(pageN!==cur){md+='\n## Page '+pageN+'\n';cur=pageN;}
    md+='\n**[p'+pageN+'#'+numberFor(c)+']'+(c.resolved?' (resolved)':'')+' — '+(c.author||'Anonymous')+'**  \n';
    md+='- Location: '+locWord(c.anchor)+' of the page (x'+Math.round(((c.anchor&&c.anchor.xPct)||0)*100)+'% y'+Math.round(((c.anchor&&c.anchor.yPct)||0)*100)+'%)  \n';
    if(near(c)) md+='- Near: "'+near(c)+'"  \n';
    md+='- Comment: '+(c.text||'').replace(/\s*\n\s*/g,' ')+'  \n';
    (c.replies||[]).forEach(r=> md+='  - ↳ '+(r.author||'')+': '+(r.text||'').replace(/\s*\n\s*/g,' ')+'  \n');
  });
  if(!list.length) md+='\n_No comments on this document yet._\n';
  return md;
}
let exportFmt='md', exportCache={md:'',json:''};
async function openExport(){
  exportModal.hidden=false;
  document.getElementById('exportSub').textContent='Document: '+labelOf(activeDoc)+' · exporting the comments on this document';
  document.getElementById('exportText').value='Preparing…';
  exportCache.md=await buildExport('md'); exportCache.json=await buildExport('json');
  setExportFmt(exportFmt);
}
function setExportFmt(f){exportFmt=f;document.querySelectorAll('.modal-tabs button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.fmt===f));document.getElementById('exportText').value=exportCache[f];}
function downloadText(name,text,type){const b=new Blob([text],{type:type||'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
document.getElementById('exportBtn').addEventListener('click',openExport);
document.getElementById('exportClose').addEventListener('click',()=>exportModal.hidden=true);
exportModal.addEventListener('click',e=>{if(e.target===exportModal)exportModal.hidden=true;});
document.querySelectorAll('.modal-tabs button').forEach(b=>b.addEventListener('click',()=>setExportFmt(b.dataset.fmt)));
document.getElementById('exportCopy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(exportCache[exportFmt]);toast('Copied — paste into Claude');}catch{const t=document.getElementById('exportText');t.focus();t.select();toast('Selected — press ⌘/Ctrl+C');}});
document.getElementById('exportDownload').addEventListener('click',()=>{const ext=exportFmt==='json'?'json':'md';downloadText('review-comments.'+ext,exportCache[exportFmt],exportFmt==='json'?'application/json':'text/markdown');});

/* Annotated PDF: the original PDF with a numbered marker at every comment + a comment index. One self-contained file. */
let PDFLib=null;
function downloadBytes(name,bytes,type){const b=new Blob([bytes],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
async function exportAnnotatedPDF(){
  const docId=activeDoc, st=docState[docId]; if(!st){toast('Open a document first');return;}
  const btn=document.getElementById('exportPdf'); const old=btn.textContent; btn.textContent='Building…'; btn.disabled=true;
  try{
    if(!PDFLib) PDFLib=await import(window.PDFLIB_SRC);
    const {PDFDocument,StandardFonts,rgb}=PDFLib;
    const bytes=await (await fetch(st.def.src)).arrayBuffer();
    const pdf=await PDFDocument.load(bytes);
    const font=await pdf.embedFont(StandardFonts.Helvetica), fontB=await pdf.embedFont(StandardFonts.HelveticaBold);
    const pages=pdf.getPages();
    const list=comments.filter(c=>c.version===docId&&(c.kind||'comment')==='comment')
      .sort((a,b)=>(((a.anchor&&a.anchor.page)||0)-((b.anchor&&b.anchor.page)||0))||(a.createdAt-b.createdAt));
    const green=rgb(0.137,0.953,0.631), ink=rgb(0.2,0.063,0.278), grey=rgb(0.42,0.42,0.42), body=rgb(0.15,0.15,0.15);
    list.forEach((c,i)=>{ const p=pages[((c.anchor&&c.anchor.page)||1)-1]; if(!p)return;
      const w=p.getWidth(), h=p.getHeight(); const x=(c.anchor.xPct||0)*w, y=h-(c.anchor.yPct||0)*h;
      const r=Math.max(10,w*0.008); p.drawCircle({x,y,size:r,color:green,borderColor:ink,borderWidth:1.3});
      const n=String(i+1), fs=r*1.15, tw=fontB.widthOfTextAtSize(n,fs);
      p.drawText(n,{x:x-tw/2,y:y-fs*0.36,size:fs,font:fontB,color:ink});
    });
    const A4=[595.28,841.89], M=48; let page=pdf.addPage(A4), pw=page.getWidth(), ph=page.getHeight(), yy=ph-M;
    const clean=s=>String(s==null?'':s).replace(/\u21b3/g,'>').replace(/[\u2018\u2019]/g,"'").replace(/[\u201c\u201d]/g,'"').replace(/[\u2013\u2014]/g,'-').replace(/\u2026/g,'...').replace(/[\u2022\u00b7]/g,'-').replace(/[^\x20-\x7E]/g,'?');
    const draw=(text,size,fnt,color,indent=0,gap=4)=>{ const maxw=pw-2*M-indent; const words=clean(text).split(/\s+/); let line='',lines=[];
      words.forEach(w=>{const t=line?line+' '+w:w; if(fnt.widthOfTextAtSize(t,size)>maxw){if(line)lines.push(line);line=w;}else line=t;}); if(line)lines.push(line); if(!lines.length)lines.push('');
      lines.forEach(ln=>{ if(yy<M+size){page=pdf.addPage(A4);yy=ph-M;} page.drawText(ln,{x:M+indent,y:yy,size,font:fnt,color}); yy-=size+gap; }); };
    draw('Review comments — '+labelOf(docId),16,fontB,ink,0,8);
    draw(list.length+' comments · exported '+new Date().toLocaleString(),9,font,grey,0,14);
    let cur=null;
    list.forEach((c,i)=>{ const pageN=(c.anchor&&c.anchor.page)||1;
      if(pageN!==cur){ yy-=8; draw('Page '+pageN,11,fontB,ink,0,6); cur=pageN; }
      draw('#'+(i+1)+'   '+(c.author||'Anonymous')+(c.resolved?'   (resolved)':''),10,fontB,ink,12,3);
      draw(c.text||'',10,font,body,12,3);
      (c.replies||[]).forEach(r=>draw('↳ '+(r.author||'')+': '+(r.text||''),9,font,grey,24,3));
      yy-=5;
    });
    downloadBytes('report-with-comments.pdf', await pdf.save(), 'application/pdf');
    toast('Annotated PDF downloaded ('+list.length+' comments)');
  }catch(e){ console.error(e); toast('Could not build the PDF (need internet for pdf-lib)'); }
  finally{ btn.textContent=old; btn.disabled=false; }
}
document.getElementById('exportPdf').addEventListener('click',exportAnnotatedPDF);

/* ============================ IMPORT AMENDMENTS ============================ */
const importFile=document.getElementById('importFile');
document.getElementById('importBtn').addEventListener('click',()=>{
  if(DOCS.length<2){ toast('Add the amended PDF as a 2nd document first (see README), then switch to it'); }
  importFile.value=''; importFile.click();
});
importFile.addEventListener('change',async()=>{
  const f=importFile.files[0]; if(!f)return;
  let data; try{ data=JSON.parse(await f.text()); }catch{ toast('Could not read that file as JSON'); return; }
  let items=Array.isArray(data)?data:(Array.isArray(data.amendments)?data.amendments:null);
  if(!items){ toast('That file is not an amendments list'); return; }
  const st=docState[activeDoc]; if(!st){ toast('Open a document first'); return; }
  let unplaced=0;
  for(const it of items){
    const page=Math.max(1,Math.min(st.pdf.numPages,parseInt(it.page,10)||1));
    let xPct=(typeof it.xPct==='number')?it.xPct:null, yPct=(typeof it.yPct==='number')?it.yPct:null;
    if((xPct==null||yPct==null)&&it.anchorText){const hit=await findPhrase(st,page,it.anchorText);if(hit){xPct=hit.xPct;yPct=hit.yPct;}}
    if(xPct==null||yPct==null){xPct=0.5;yPct=0.05;unplaced++;}
    const title=it.title?String(it.title):'', detail=it.detail||it.text||'', ref=it.ref?('  ('+it.ref+')'):'';
    const c={id:uid(),version:activeDoc,kind:'amendment',anchor:{page,xPct,yPct},author:it.author||'Editor',
      text:(title?title+' — ':'')+detail+ref,createdAt:Date.now(),resolved:false,replies:[]};
    await store.adapter.add(c);
  }
  setDoc(activeDoc);
  toast('Imported '+items.length+' amendment'+(items.length===1?'':'s')+(unplaced?(' · '+unplaced+' need manual placement'):''));
});

/* ============================ BACKUP / RESTORE / MIGRATE ============================ */
const restoreFile=document.getElementById('restoreFile');
const migrateBanner=document.getElementById('migrateBanner');
function localStored(){ try{return JSON.parse(localStorage.getItem('cd_report_comments_v1'))||[]}catch{return[]} }
function stripPrivate(o){const x={...o};Object.keys(x).forEach(k=>{if(k[0]==='_')delete x[k];});return x;}
function backupComments(){
  const clean=comments.map(stripPrivate);
  downloadText('comments-backup-'+new Date().toISOString().slice(0,10)+'.json',
    JSON.stringify({type:'cd-comments-backup',schema:1,exported:new Date().toISOString(),count:clean.length,comments:clean},null,2),
    'application/json');
  toast('Backed up '+clean.length+' comment'+(clean.length===1?'':'s'));
}
async function restoreComments(list){
  if(!Array.isArray(list)){ list=(list&&Array.isArray(list.comments))?list.comments:null; }
  if(!list){ toast('That doesn’t look like a comments backup'); return 0; }
  const have=new Set(comments.map(c=>c.id)); let n=0;
  for(let it of list){ if(!it||typeof it!=='object')continue; it=stripPrivate(it); if(!it.id)it.id=uid();
    if(have.has(it.id))continue; if(!it.createdAt)it.createdAt=Date.now(); if(!it.replies)it.replies=[];
    await store.adapter.add(it); have.add(it.id); n++; }
  toast('Restored '+n+' comment'+(n===1?'':'s')+(n<list.length?(' · '+(list.length-n)+' already present'):''));
  return n;
}
document.getElementById('backupBtn').addEventListener('click',backupComments);
document.getElementById('restoreBtn').addEventListener('click',()=>{restoreFile.value='';restoreFile.click();});
restoreFile.addEventListener('change',async()=>{const f=restoreFile.files[0];if(!f)return;let data;try{data=JSON.parse(await f.text());}catch{toast('Could not read that file as JSON');return;}await restoreComments(data);});

/* If we're in shared mode but this browser still has device-only comments, offer to merge them. */
function checkMigrate(){
  if(!store.adapter||store.adapter.kind!=='shared'){ migrateBanner.hidden=true; return; }
  const local=localStored(); if(!local.length){ migrateBanner.hidden=true; return; }
  const have=new Set(comments.map(c=>c.id));
  const extra=local.filter(c=>c&&c.id&&!have.has(c.id));
  if(!extra.length){ migrateBanner.hidden=true; return; }
  migrateBanner.hidden=false;
  migrateBanner.innerHTML=''+extra.length+' comment'+(extra.length>1?'s are':' is')+' saved on this device but not yet in the shared database.<br><button id="migrateGo">Add '+(extra.length>1?'them':'it')+' to the shared database</button>';
  document.getElementById('migrateGo').addEventListener('click',async()=>{migrateBanner.hidden=true;await restoreComments(extra);});
}

})();
